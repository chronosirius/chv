<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Instagram Analytics</title>
    <script>
        window.tailwind = { config: { darkMode: 'class' } };
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* We define the animation here as Tailwind doesn't have 
     an 'indeterminate' slide built-in */
  .progress-bar-value {
    width: 30%;
    animation: indeterminate 1.1s infinite linear;
    transform-origin: 0% 50%;
  }

  @keyframes indeterminate {
    0% {
      transform:  translateX(-100%) scaleX(1);
    }
    50% {
      transform:  translateX(100%) scaleX(1.5);
    }
    100% {
      transform:  translateX(400%) scaleX(1);
    }
  }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">
    <div class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Instagram Analytics</h1>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">You: {{ current_username or '-' }}</p>
            </div>
            <div class="flex gap-4">
                <a href="/trends" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
                    Trends
                </a>
                <a href="/game" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition-colors">
                    Game
                </a>
                <button type="button" onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200" aria-label="Toggle theme" title="Toggle theme">
                    <span id="theme-icon">🌙</span>
                </button>
                <button onclick="deleteAccount()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                    Delete Data
                </button>
                <a href="/logout" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg transition-colors">
                    Logout
                </a>
            </div>
        </div>

        <div class="mb-6 flex gap-4 items-end">
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Select Conversation
                </label>
                <select 
                    id="conversation-select"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white"
                >
                    <option value="">Loading conversations...</option>
                </select>
                <div class="w-full" id="loading-indicator" style="display: none; margin-top: 4px;">
                    <div class="relative h-3 rounded-lg w-full overflow-hidden light:bg-blue-100 dark:bg-blue-900">
                        <div class="progress-bar-value absolute h-full bg-blue-500"></div>
                    </div>
                </div>
            </div>
            <button 
                id="share-btn"
                onclick="shareChat()"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                disabled
            >
                Share Chat
            </button>
        </div>

        <div id="content-area" class="space-y-6">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8 text-center">
                <p class="text-gray-400 dark:text-gray-500 text-lg">Nothing selected.</p>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;
        let currentConversationId = null;
        let customBoxes = [];
        let dailyMessagesChart = null;
        const UPLOADER_USERNAME = "{{ current_username or '' }}";
        const MESSAGES_PER_PAGE = 50;
        let periodCurrentPage = 1;
        let currentPeriodStartMs = null;
        let currentPeriodEndMs = null;

        // Theme management
        function setThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (!icon) return;
            const isDark = document.documentElement.classList.contains('dark');
            icon.textContent = isDark ? '☀️' : '🌙';
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            setThemeIcon();
            renderDailyMessagesChart();
        }

        setThemeIcon();

        // Utility functions
        function formatDate(ms) {
            return new Date(ms).toLocaleString();
        }

        function formatShortDate(ms) {
            return new Date(ms).toLocaleDateString();
        }

        function formatDuration(ms) {
            const days = Math.floor(ms / 86400000);
            const hours = Math.floor((ms % 86400000) / 3600000);
            const minutes = Math.floor((ms % 3600000) / 60000);
            
            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            return `${minutes}m`;
        }

        function formatLocalDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function parseLocalDateKey(key) {
            const [year, month, day] = key.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function startOfLocalWeek(date) {
            const local = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const day = local.getDay();
            const diffToMonday = (day + 6) % 7;
            local.setDate(local.getDate() - diffToMonday);
            return local;
        }

        function addDays(date, days) {
            const next = new Date(date);
            next.setDate(next.getDate() + days);
            return next;
        }

        function movingAverage(values, windowSize) {
            return values.map((_, index) => {
                const windowStart = Math.max(0, index - (windowSize - 1));
                const sample = values.slice(windowStart, index + 1);
                const sum = sample.reduce((acc, value) => acc + value, 0);
                return Number((sum / sample.length).toFixed(2));
            });
        }

        function getMessageTimeBounds(messages) {
            if (!messages || messages.length === 0) return null;

            let minTimestamp = messages[0].timestamp_ms;
            let maxTimestamp = messages[0].timestamp_ms;

            for (let index = 1; index < messages.length; index++) {
                const timestamp = messages[index].timestamp_ms;
                if (timestamp < minTimestamp) minTimestamp = timestamp;
                if (timestamp > maxTimestamp) maxTimestamp = timestamp;
            }

            return { minTimestamp, maxTimestamp };
        }

        function initializeChartControls() {
            const startInput = document.getElementById('chart-start-date');
            const endInput = document.getElementById('chart-end-date');
            if (!startInput || !endInput || !currentData || !currentData.messages || currentData.messages.length === 0) return;

            const bounds = getMessageTimeBounds(currentData.messages);
            if (!bounds) return;

            const minDate = formatLocalDateKey(new Date(bounds.minTimestamp));
            const maxDate = formatLocalDateKey(new Date(bounds.maxTimestamp));

            startInput.min = minDate;
            startInput.max = maxDate;
            endInput.min = minDate;
            endInput.max = maxDate;

            if (!startInput.value) startInput.value = minDate;
            if (!endInput.value) endInput.value = maxDate;
        }

        function resetChartRange() {
            const startInput = document.getElementById('chart-start-date');
            const endInput = document.getElementById('chart-end-date');
            if (!startInput || !endInput || !currentData || !currentData.messages || currentData.messages.length === 0) return;

            const bounds = getMessageTimeBounds(currentData.messages);
            if (!bounds) return;

            startInput.value = formatLocalDateKey(new Date(bounds.minTimestamp));
            endInput.value = formatLocalDateKey(new Date(bounds.maxTimestamp));
            renderTrendRangeViews();
        }

        function escapeHtml(value) {
            if (value == null) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function isUploaderSender(senderName) {
            if (!UPLOADER_USERNAME || !senderName) return false;
            return String(senderName).trim().toLowerCase() === String(UPLOADER_USERNAME).trim().toLowerCase();
        }

        function getSenderAlignmentMap() {
            const senderNames = Object.keys(currentData?.messages_by_sender || {});
            const alignmentMap = {};

            senderNames.forEach((senderName) => {
                if (isUploaderSender(senderName)) {
                    alignmentMap[senderName] = 'right';
                } else {
                    alignmentMap[senderName] = 'left';
                }
            });
            return alignmentMap;
        }

        function renderPeriodMessagesForSelectedRange() {
            const feed = document.getElementById('period-messages-feed');
            const meta = document.getElementById('period-messages-meta');
            const pageLabel = document.getElementById('period-messages-page-label');
            const prevButton = document.getElementById('period-messages-prev');
            const nextButton = document.getElementById('period-messages-next');
            if (!feed || !meta || !currentData || !currentData.messages) return;

            if (currentPeriodStartMs == null || currentPeriodEndMs == null) {
                meta.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">Select a period to load messages.</p>';
                feed.innerHTML = '<div class="h-full flex items-center justify-center text-sm text-gray-500 dark:text-gray-400">Choose a period from Period Analysis.</div>';
                if (pageLabel) pageLabel.textContent = 'Page 0 of 0';
                if (prevButton) prevButton.disabled = true;
                if (nextButton) nextButton.disabled = true;
                return;
            }

            const rangeMessages = currentData.messages
                .filter((message) => message.timestamp_ms >= currentPeriodStartMs && message.timestamp_ms < currentPeriodEndMs)
                .sort((a, b) => a.timestamp_ms - b.timestamp_ms);

            if (rangeMessages.length === 0) {
                meta.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">No messages in the selected date range.</p>';
                feed.innerHTML = '<div class="h-full flex items-center justify-center text-sm text-gray-500 dark:text-gray-400">Try expanding the range to load messages.</div>';
                if (pageLabel) pageLabel.textContent = 'Page 0 of 0';
                if (prevButton) prevButton.disabled = true;
                if (nextButton) nextButton.disabled = true;
                return;
            }

            const totalPages = Math.ceil(rangeMessages.length / MESSAGES_PER_PAGE);
            if (periodCurrentPage > totalPages) periodCurrentPage = totalPages;
            if (periodCurrentPage < 1) periodCurrentPage = 1;

            const startIndex = (periodCurrentPage - 1) * MESSAGES_PER_PAGE;
            const endIndex = Math.min(startIndex + MESSAGES_PER_PAGE, rangeMessages.length);
            const pageMessages = rangeMessages.slice(startIndex, endIndex);

            const senderAlignmentMap = getSenderAlignmentMap();
            meta.innerHTML = `
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    Showing messages <span class="font-semibold text-gray-700 dark:text-gray-200">${startIndex + 1}</span>
                    to <span class="font-semibold text-gray-700 dark:text-gray-200">${endIndex}</span>
                    of <span class="font-semibold text-gray-700 dark:text-gray-200">${rangeMessages.length}</span>
                    in range from
                    <span class="font-semibold text-gray-700 dark:text-gray-200">${formatDate(pageMessages[0].timestamp_ms)}</span>
                    to
                    <span class="font-semibold text-gray-700 dark:text-gray-200">${formatDate(pageMessages[pageMessages.length - 1].timestamp_ms)}</span>
                </p>
            `;

            if (pageLabel) pageLabel.textContent = `Page ${periodCurrentPage} of ${totalPages}`;
            if (prevButton) prevButton.disabled = periodCurrentPage === 1;
            if (nextButton) nextButton.disabled = periodCurrentPage === totalPages;

            let previousDateKey = '';
            let previousSender = '';
            const html = pageMessages.map((message) => {
                const sender = message.sender_name || 'Unknown';
                const alignment = senderAlignmentMap[sender] || 'left';
                const localDate = new Date(message.timestamp_ms);
                const dateKey = formatLocalDateKey(localDate);
                const showDateDivider = dateKey !== previousDateKey;
                const showSender = sender !== previousSender || showDateDivider;

                previousDateKey = dateKey;
                previousSender = sender;

                const bubbleWrapClass = alignment === 'right' ? 'justify-end' : 'justify-start';
                const bubbleClass = alignment === 'right'
                    ? 'bg-blue-600 text-white rounded-2xl rounded-br-md'
                    : 'bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-2xl rounded-bl-md';
                const senderClass = alignment === 'right'
                    ? 'text-right text-blue-700 dark:text-blue-300'
                    : 'text-left text-gray-600 dark:text-gray-300';

                const content = message.content
                    ? escapeHtml(message.content).replace(/\n/g, '<br>')
                    : '<span class="italic opacity-80">(attachment)</span>';

                return `
                    ${showDateDivider ? `<div class="flex items-center justify-center my-3"><span class="px-3 py-1 text-xs rounded-full bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300">${localDate.toLocaleDateString()}</span></div>` : ''}
                    <div class="flex ${bubbleWrapClass} mb-2">
                        <div class="max-w-[88%] sm:max-w-[78%]">
                            ${showSender ? `<p class="text-xs mb-1 ${senderClass}">${escapeHtml(sender)}</p>` : ''}
                            <div class="px-3 py-2 shadow-sm ${bubbleClass}">
                                <p class="text-sm break-words">${content}</p>
                                <p class="mt-1 text-[11px] ${alignment === 'right' ? 'text-blue-100' : 'text-gray-500 dark:text-gray-400'}">${formatDate(message.timestamp_ms)}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            feed.innerHTML = html;
            feed.scrollTop = 0;
        }

        function changePeriodMessagePage(direction) {
            periodCurrentPage += direction;
            renderPeriodMessagesForSelectedRange();
        }

        function renderTrendRangeViews() {
            renderDailyMessagesChart();
        }

        function chartOptionsFromControls() {
            const aggregation = document.getElementById('chart-aggregation')?.value || 'day';
            const view = document.getElementById('chart-view')?.value || 'total';
            const startValue = document.getElementById('chart-start-date')?.value || null;
            const endValue = document.getElementById('chart-end-date')?.value || null;
            return { aggregation, view, startValue, endValue };
        }

        function buildMessageSeries(messages, options) {
            if (!messages || messages.length === 0) {
                return {
                    aggregation: options.aggregation,
                    view: options.view,
                    labels: [],
                    datasets: [],
                    peakCount: 0,
                    peakLabel: '-',
                    totalDays: 0,
                    activeDays: 0,
                    averagePerDay: 0,
                    totalMessages: 0
                };
            }

            let rangeStartMs = -Infinity;
            let rangeEndMs = Infinity;

            if (options.startValue) {
                rangeStartMs = parseLocalDateKey(options.startValue).getTime();
            }
            if (options.endValue) {
                const endInclusive = parseLocalDateKey(options.endValue);
                rangeEndMs = addDays(endInclusive, 1).getTime();
            }

            const filteredMessages = messages.filter((message) => {
                return message.timestamp_ms >= rangeStartMs && message.timestamp_ms < rangeEndMs;
            });

            if (filteredMessages.length === 0) {
                return {
                    aggregation: options.aggregation,
                    view: options.view,
                    labels: [],
                    datasets: [],
                    peakCount: 0,
                    peakLabel: '-',
                    totalDays: 0,
                    activeDays: 0,
                    averagePerDay: 0,
                    totalMessages: 0
                };
            }

            const bucketMap = {};
            filteredMessages.forEach((message) => {
                const date = new Date(message.timestamp_ms);
                const sender = message.sender_name || 'Unknown';
                let key;
                if (options.aggregation === 'week') {
                    key = formatLocalDateKey(startOfLocalWeek(date));
                } else {
                    key = formatLocalDateKey(date);
                }

                if (!bucketMap[key]) {
                    bucketMap[key] = { total: 0, bySender: {} };
                }

                bucketMap[key].total += 1;
                bucketMap[key].bySender[sender] = (bucketMap[key].bySender[sender] || 0) + 1;
            });

            const sortedKeys = Object.keys(bucketMap).sort();
            const allSenders = Object.keys(filteredMessages.reduce((acc, message) => {
                const sender = message.sender_name || 'Unknown';
                acc[sender] = true;
                return acc;
            }, {}));

            const labels = [];
            const totals = [];
            const countsBySender = {};
            allSenders.forEach((sender) => {
                countsBySender[sender] = [];
            });

            sortedKeys.forEach((key) => {
                const bucketDate = parseLocalDateKey(key);
                if (options.aggregation === 'week') {
                    const weekEnd = addDays(bucketDate, 6);
                    labels.push(`${bucketDate.toLocaleDateString()} - ${weekEnd.toLocaleDateString()}`);
                } else {
                    labels.push(bucketDate.toLocaleDateString());
                }

                totals.push(bucketMap[key].total);
                allSenders.forEach((sender) => {
                    countsBySender[sender].push(bucketMap[key].bySender[sender] || 0);
                });
            });

            const trendWindow = options.aggregation === 'week' ? 4 : 7;
            const trend = movingAverage(totals, trendWindow);

            let peakIndex = 0;
            totals.forEach((value, index) => {
                if (value > totals[peakIndex]) {
                    peakIndex = index;
                }
            });

            const totalMessages = totals.reduce((acc, value) => acc + value, 0);
            const totalDays = labels.length;
            const activeDays = totals.filter((value) => value > 0).length;

            const datasets = [];
            if (options.view === 'participant') {
                allSenders.forEach((sender) => {
                    datasets.push({
                        label: sender,
                        data: countsBySender[sender],
                        kind: 'participant'
                    });
                });
                datasets.push({
                    label: `${options.aggregation === 'week' ? '4-Week' : '7-Day'} Avg (All Participants)`,
                    data: trend,
                    kind: 'trend'
                });
            } else {
                datasets.push({
                    label: options.aggregation === 'week' ? 'Messages / Week' : 'Messages / Day',
                    data: totals,
                    kind: 'total'
                });
                datasets.push({
                    label: options.aggregation === 'week' ? '4-Week Avg' : '7-Day Avg',
                    data: trend,
                    kind: 'trend'
                });
            }

            return {
                aggregation: options.aggregation,
                view: options.view,
                labels,
                datasets,
                peakCount: totals[peakIndex],
                peakLabel: labels[peakIndex],
                totalDays,
                activeDays,
                averagePerDay: totalDays > 0 ? totalMessages / totalDays : 0,
                totalMessages
            };
        }

        function renderDailyMessagesChart() {
            const canvas = document.getElementById('daily-messages-chart');
            const summary = document.getElementById('daily-messages-summary');
            if (!canvas || !summary || !currentData || !currentData.messages) return;

            if (dailyMessagesChart) {
                dailyMessagesChart.destroy();
                dailyMessagesChart = null;
            }

            const options = chartOptionsFromControls();
            const series = buildMessageSeries(currentData.messages, options);
            if (series.labels.length === 0) {
                summary.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">No messages found in the selected range.</p>';
                return;
            }

            if (typeof Chart === 'undefined') {
                summary.innerHTML = '<p class="text-sm text-red-600 dark:text-red-400">Chart library failed to load.</p>';
                return;
            }

            const isDark = document.documentElement.classList.contains('dark');
            const gridColor = isDark ? 'rgba(148, 163, 184, 0.18)' : 'rgba(100, 116, 139, 0.2)';
            const axisColor = isDark ? '#cbd5e1' : '#475569';
            const primaryLine = isDark ? '#60a5fa' : '#2563eb';
            const primaryFill = isDark ? 'rgba(96, 165, 250, 0.18)' : 'rgba(37, 99, 235, 0.16)';
            const trendLine = isDark ? '#f59e0b' : '#d97706';
            const palette = [
                isDark ? '#22d3ee' : '#0891b2',
                isDark ? '#34d399' : '#059669',
                isDark ? '#a78bfa' : '#7c3aed',
                isDark ? '#fb7185' : '#e11d48',
                isDark ? '#f97316' : '#ea580c',
                isDark ? '#eab308' : '#ca8a04',
                isDark ? '#f43f5e' : '#be123c',
                isDark ? '#38bdf8' : '#0284c7'
            ];

            const chartDatasets = series.datasets.map((dataset, index) => {
                if (dataset.kind === 'trend') {
                    return {
                        label: dataset.label,
                        data: dataset.data,
                        borderColor: trendLine,
                        borderWidth: 2,
                        borderDash: [6, 4],
                        pointRadius: 0,
                        fill: false,
                        tension: 0.25
                    };
                }

                if (dataset.kind === 'participant') {
                    const color = palette[index % palette.length];
                    return {
                        label: dataset.label,
                        data: dataset.data,
                        borderColor: color,
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        fill: false,
                        tension: 0.2
                    };
                }

                return {
                    label: dataset.label,
                    data: dataset.data,
                    borderColor: primaryLine,
                    backgroundColor: primaryFill,
                    borderWidth: 2,
                    pointRadius: 1,
                    pointHoverRadius: 4,
                    fill: true,
                    tension: 0.2
                };
            });

            dailyMessagesChart = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: series.labels,
                    datasets: chartDatasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: axisColor
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: axisColor,
                                maxTicksLimit: 10
                            },
                            grid: {
                                color: gridColor
                            }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: {
                                precision: 0,
                                color: axisColor
                            },
                            grid: {
                                color: gridColor
                            }
                        }
                    }
                }
            });

            summary.innerHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm">
                    <div class="rounded-lg bg-gray-50 dark:bg-gray-700/40 p-3">
                        <p class="text-gray-500 dark:text-gray-400">Peak ${series.aggregation === 'week' ? 'Week' : 'Day'}</p>
                        <p class="font-semibold text-gray-900 dark:text-white">${series.peakLabel} (${series.peakCount})</p>
                    </div>
                    <div class="rounded-lg bg-gray-50 dark:bg-gray-700/40 p-3">
                        <p class="text-gray-500 dark:text-gray-400">Average / ${series.aggregation === 'week' ? 'Week' : 'Day'}</p>
                        <p class="font-semibold text-gray-900 dark:text-white">${series.averagePerDay.toFixed(1)}</p>
                    </div>
                    <div class="rounded-lg bg-gray-50 dark:bg-gray-700/40 p-3">
                        <p class="text-gray-500 dark:text-gray-400">Active ${series.aggregation === 'week' ? 'Weeks' : 'Days'}</p>
                        <p class="font-semibold text-gray-900 dark:text-white">${series.activeDays} / ${series.totalDays} (${series.totalMessages} total)</p>
                    </div>
                </div>
            `;
        }

        // Delete account
        async function deleteAccount() {
            if (!confirm('Are you sure you want to delete all your data? This cannot be undone.')) {
                return;
            }
            
            const response = await fetch('/api/delete_account', { method: 'POST' });
            if (response.ok) {
                window.location.href = '/';
            } else {
                alert('Failed to delete data');
            }
        }

        // Share chat
        async function shareChat() {
            const targetCode = prompt('Enter the access code to share this chat with:');
            if (!targetCode) return;
            
            const response = await fetch('/api/share_chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    conversation_id: currentConversationId,
                    target_code: targetCode
                })
            });
            
            const data = await response.json();
            if (response.ok) {
                alert(data.message || 'Chat shared successfully!');
            } else {
                alert('Error: ' + data.error);
            }
        }

        // Load conversations
        async function loadConversations() {
            const response = await fetch('/api/conversations');
            const conversations = await response.json();
            
            const select = document.getElementById('conversation-select');
            select.innerHTML = '<option value="">Select a conversation...</option>';
            
            conversations.forEach(conv => {

                    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8 text-center">

                    </div>

            const response = await fetch(`/api/conversation/${conversationId}`);

        // Compute most used word
        async function computeMostUsedWord(requiresPasscode) {
            let passcode = '';
            if (requiresPasscode) {
                passcode = prompt('Enter passcode to compute:');
                if (!passcode) return;
            }
            
            const container = document.getElementById('word-analysis');
            container.innerHTML = '<p class="text-gray-600 dark:text-gray-400">Computing...</p>';
            
            const response = await fetch('/api/compute_word', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    conversation_id: currentConversationId,
                    passcode: passcode
                })
            });
            
            if (response.ok) {
                const data = await response.json();
                if (data.words && data.words.length > 0) {
                    const wordsHTML = data.words.map(([word, count]) => 
                        `<div class="flex justify-between"><span class="text-gray-700 dark:text-gray-300">${word}</span><span class="font-semibold text-gray-900 dark:text-white">${count}</span></div>`
                    ).join('');
                    container.innerHTML = `<div class="space-y-2">${wordsHTML}</div>`;
                } else {
                    container.innerHTML = '<p class="text-gray-600 dark:text-gray-400">No words found</p>';
                }
            } else {
                const error = await response.json();
                container.innerHTML = `<p class="text-red-600 dark:text-red-400">Error: ${error.error}</p>`;
            }
        }

        async function promptCountSpecificString() {
            const word = prompt('Enter the string to count occurrences of:');
            if (!word) return;
            const container = document.getElementById('count-specific-string');
            container.innerHTML = '<p class="text-gray-600 dark:text-gray-400">Counting...</p>';
            const response = await fetch('/api/count_specific_string', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    conversation_id: currentConversationId,
                    string: word
                })
            });
            if (response.ok) {
                const data = await response.json();
                container.innerHTML = `<p class="text-gray-700 dark:text-gray-300">The string "<strong>${data.string}</strong>" appears <strong>${data.count}</strong> times.</p><br>
                    <button onclick="promptCountSpecificString()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg">Count Another String</button>
                `;
            } else {
                const error = await response.json();
                container.innerHTML = `<p class="text-red-600 dark:text-red-400">Error: ${error.error}</p>`;
            }
        }

        // Update period statistics
        async function updatePeriodStats() {
            const select = document.getElementById('period-select');
            const value = select.value;
            
            // Show/hide input sections
            const customInputs = document.getElementById('custom-period-inputs');
            const participantInputs = document.getElementById('participant-period-inputs');
            const customDensityInputs = document.getElementById('custom-density-inputs');
            
            customInputs.classList.add('hidden');
            participantInputs.classList.add('hidden');
            customDensityInputs.classList.add('hidden');
            
            if (value === 'custom') {
                customInputs.classList.remove('hidden');
            } else if (value === 'max-by-participant' || value === 'min-by-participant') {
                participantInputs.classList.remove('hidden');
            } else if (value === 'custom-density') {
                customDensityInputs.classList.remove('hidden');
            }
            
            let startMs, endMs, count, days, label;
            const lastMessageTime = currentData.latest.timestamp_ms;
            const MS_PER_DAY = 86400000;

            if (value === 'all-time') {
                startMs = currentData.oldest.timestamp_ms;
                endMs = currentData.latest.timestamp_ms + 1;
                count = currentData.messages.filter(m => m.timestamp_ms >= startMs && m.timestamp_ms < endMs).length;
                days = Math.max(1, Math.ceil((endMs - startMs) / MS_PER_DAY));
                label = 'All Time';
            } else if (value === 'custom') {
                const startDate = document.getElementById('custom-start').value;
                const endDate = document.getElementById('custom-end').value;
                
                if (!startDate || !endDate) return;
                
                startMs = new Date(startDate).getTime();
                endMs = new Date(endDate).getTime() + 86399999; // End of day
                days = Math.ceil((endMs - startMs) / MS_PER_DAY);
                count = currentData.messages.filter(m => m.timestamp_ms >= startMs && m.timestamp_ms <= endMs).length;
                label = 'Custom Period';
            } else if (value === 'custom-density') {
                days = parseInt(document.getElementById('custom-density-days').value);
                
                if (isNaN(days) || !days || days < 1) return;
                
                // Show loading indicator
                document.getElementById('period-stats').innerHTML = '<p class="text-gray-600 dark:text-gray-400">Calculating...</p>';
                
                // Call server API for calculation
                const response = await fetch('/api/custom_density', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversation_id: currentConversationId,
                        days: days
                    })
                });
                
                if (!response.ok) {
                    document.getElementById('period-stats').innerHTML = '<p class="text-red-600 dark:text-red-400">Error calculating period</p>';
                    return;
                }
                
                const result = await response.json();
                startMs = result.start_ms;
                endMs = result.end_ms;
                count = result.count;
                label = `${days}-Day Highest Density`;
            } else if (value === 'max-by-participant' || value === 'min-by-participant') {
                const participant = document.getElementById('participant-select').value;
                days = parseInt(document.getElementById('participant-days').value);
                
                if (!participant || isNaN(days) || !days || days < 1) return;
                
                // Show loading indicator
                document.getElementById('period-stats').innerHTML = '<p class="text-gray-600 dark:text-gray-400">Calculating...</p>';
                
                const findMax = value === 'max-by-participant';
                
                // Call server API for calculation
                const response = await fetch('/api/participant_period', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversation_id: currentConversationId,
                        participant: participant,
                        days: days,
                        find_max: findMax
                    })
                });
                
                if (!response.ok) {
                    document.getElementById('period-stats').innerHTML = '<p class="text-red-600 dark:text-red-400">Error calculating period</p>';
                    return;
                }
                
                const result = await response.json();
                startMs = result.start_ms;
                endMs = result.end_ms;
                count = result.total_count;
                const participantCount = result.participant_count;
                label = `${findMax ? 'Max' : 'Min'} by ${participant} (${participantCount} messages)`;
            } else if (value.startsWith('past-')) {
                days = parseInt(value.split('-')[1]);
                endMs = lastMessageTime;
                startMs = lastMessageTime - (days * MS_PER_DAY);
                count = currentData.messages.filter(m => m.timestamp_ms >= startMs && m.timestamp_ms <= endMs).length;
                label = `Past ${days} Day${days > 1 ? 's' : ''}`;
            } else if (value.startsWith('density-')) {
                days = parseInt(value.split('-')[1]);
                [startMs, endMs] = findHighestDensityPeriod(currentData.messages, days);
                count = currentData.messages.filter(m => m.timestamp_ms >= startMs && m.timestamp_ms < endMs).length;
                label = `${days}-Day Highest Density`;
            } else if (value === 'max-density') {
                startMs = currentData.max_density.start_ms;
                endMs = currentData.max_density.end_ms;
                count = currentData.max_density.count;
                days = currentData.max_density.days;
                label = `Max-Density Period`;
            }

            // Get messages in the period
            const periodMessages = currentData.messages.filter(m => m.timestamp_ms >= startMs && m.timestamp_ms < endMs);
            const firstMsg = periodMessages[0];
            const lastMsg = periodMessages[periodMessages.length - 1];

            let messagesHTML = '';
            if (firstMsg && lastMsg) {
                messagesHTML = `
                    <hr class="border-gray-300 dark:border-gray-600 my-3">
                    <div class="space-y-3">
                        <div>
                            <p class="text-sm font-medium text-gray-600 dark:text-gray-400">First Message</p>
                            <p class="text-xs text-gray-500 dark:text-gray-500">${formatDate(firstMsg.timestamp_ms)} - ${firstMsg.sender_name}</p>
                            ${firstMsg.content ? `<p class="text-sm text-gray-700 dark:text-gray-300 mt-1 italic">"${firstMsg.content.substring(0, 100)}${firstMsg.content.length > 100 ? '...' : ''}"</p>` : '<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">(attachment)</p>'}
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-600 dark:text-gray-400">Last Message</p>
                            <p class="text-xs text-gray-500 dark:text-gray-500">${formatDate(lastMsg.timestamp_ms)} - ${lastMsg.sender_name}</p>
                            ${lastMsg.content ? `<p class="text-sm text-gray-700 dark:text-gray-300 mt-1 italic">"${lastMsg.content.substring(0, 100)}${lastMsg.content.length > 100 ? '...' : ''}"</p>` : '<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">(attachment)</p>'}
                        </div>
                    </div>
                `;
            }

            document.getElementById('period-stats').innerHTML = `
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <span class="text-gray-700 dark:text-gray-300">Period</span>
                        <span class="font-semibold text-gray-900 dark:text-white">${label}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-700 dark:text-gray-300">Duration</span>
                        <span class="font-semibold text-gray-900 dark:text-white">${days} day${days > 1 ? 's' : ''}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-700 dark:text-gray-300">Date Range</span>
                        <span class="font-semibold text-gray-900 dark:text-white text-right">${formatShortDate(startMs)} - ${formatShortDate(endMs)}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-700 dark:text-gray-300">Messages</span>
                        <span class="font-semibold text-gray-900 dark:text-white">${count}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-700 dark:text-gray-300">Avg per Day</span>
                        <span class="font-semibold text-gray-900 dark:text-white">${(count / days).toFixed(1)}</span>
                    </div>
                    ${messagesHTML}
                </div>
            `;

            currentPeriodStartMs = startMs;
            currentPeriodEndMs = endMs;
            periodCurrentPage = 1;
            renderPeriodMessagesForSelectedRange();
        }

        // Helper: Find highest density period
        function findHighestDensityPeriod(data, windowDays) {
            if (!data || data.length === 0) return [0, 0];
            
            const MS_PER_DAY = 86400000;
            const windowMs = windowDays * MS_PER_DAY;
            const timestamps = data.map(d => d.timestamp_ms).sort((a, b) => a - b);
            const N = timestamps.length;
            
            let bestStartIndex = 0;
            let maxCount = 0;
            let start = 0;
            let end = 0;
            
            while (start < N) {
                const windowEndMs = timestamps[start] + windowMs;
                while (end < N && timestamps[end] < windowEndMs) {
                    end++;
                }
                const currentCount = end - start;
                if (currentCount > maxCount) {
                    maxCount = currentCount;
                    bestStartIndex = start;
                }
                start++;
            }
            
            const startMs = timestamps[bestStartIndex];
            const endMs = startMs + windowMs;
            return [startMs, endMs];
        }

        // Render custom boxes
        function renderCustomBoxes() {
            const container = document.getElementById('custom-boxes');
            container.innerHTML = customBoxes.map(box => `
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">${box.title}</h3>
                    <div id="${box.id}"></div>
                </div>
            `).join('');
            
            customBoxes.forEach(box => {
                box.render(currentData);
            });
        }

        // Public API for extensions
        window.InstagramAnalytics = {
            addCustomBox: function(title, id, renderFunction) {
                customBoxes.push({ title, id, render: renderFunction });
                if (currentData) {
                    renderCustomBoxes();
                }
            },
            getData: function() {
                return currentData;
            },
            formatDate: formatDate,
            formatShortDate: formatShortDate,
            formatDuration: formatDuration
        };

        // Event listeners
        document.getElementById('conversation-select').addEventListener('change', (e) => {
            loadConversation(e.target.value);
        });

        // Initialize
        loadConversations();
    </script>
    <script>
        function formatMs(ms) {
            if (!ms || ms === 0) return '—';
            const totalSeconds = Math.floor(ms / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            if (days > 0) return `${days}d ${hours}h ${minutes}m`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }
    </script>
    <script>
        window.InstagramAnalytics.addCustomBox('Average Message Length', 'avg-message-length-box', function(data) {
            const container = document.getElementById('avg-message-length-box');
            if (!data) {
                container.innerHTML = '<p class="text-gray-600 dark:text-gray-400">No data available.</p>';
                return;
            }
            let html = `
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <span class="text-gray-700 dark:text-gray-300">Overall Average Length</span>
                        <span class="font-semibold text-gray-900 dark:text-white">${data.average_message_length.overall.toFixed(1)} characters</span>
                    </div>
            `;
            for (const [sender, avgLength] of Object.entries(data.average_message_length.by_sender)) {
                html += `
                    <div class="flex justify-between">
                        <span class="text-gray-700 dark:text-gray-300">${sender}</span>
                        <span class="font-semibold text-gray-900 dark:text-white">${avgLength.toFixed(1)} characters</span>
                    </div>
                `;
            }
            html += '</div>';
            container.innerHTML = html;
        });
    </script>
