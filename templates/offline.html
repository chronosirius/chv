<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline – Instagram Analytics</title>
    <script>
        window.tailwind = { config: { darkMode: 'class' } };
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center transition-colors">
    <div class="max-w-md w-full mx-auto px-6 text-center">
        <div class="mb-6 text-amber-500 dark:text-amber-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M8.111 8.111A6 6 0 0015.89 15.89M1.5 8.25A10.5 10.5 0 0121 12m-2.61 5.64A10.5 10.5 0 013 12m4.5-4.5a6 6 0 018.485 8.485" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">You're offline</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-6">
            This feature requires an internet connection and isn't available offline.
            Please reconnect and try again.
        </p>
        <a href="/dashboard"
           class="inline-block px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">
            ← Back to Dashboard
        </a>
    </div>
</body>
</html>
