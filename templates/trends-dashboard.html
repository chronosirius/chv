        // ── Conversation Stats Tab ────────────────────────────────────────────
        let convoStatsTrendChart = null;
        let convoStatsTrendData = null;
        let convoStatsPollInterval = null;
        let convoStatsWindowCount = 1;
        let convoStatsTotalWindows = 1;
        const CONVO_WINDOW_DAYS = 30;

        function formatMs(ms) {
            if (!ms || ms === 0) return '—';
            const totalSeconds = Math.floor(ms / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            if (days > 0) return `${days}d ${hours}h ${minutes}m`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        function escapeHtmlTrends(value) {
            if (value == null) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getConvoStatsDateRange() {
            const perChat = convoStatsTrendData?.per_chat_convos_per_day || {};
            let minDate = null, maxDate = null;
            Object.values(perChat).forEach(chatData => {
                Object.keys(chatData.convos_per_day || {}).forEach(d => {
                    if (!minDate || d < minDate) minDate = d;
                    if (!maxDate || d > maxDate) maxDate = d;
                });
            });
            return { minDate, maxDate };
        }

        function updateConvoMonthWindowControls() {
            const backBtn = document.getElementById('convo-month-back-btn');
            const fwdBtn = document.getElementById('convo-month-forward-btn');
            const label = document.getElementById('convo-month-window-label');
            if (!backBtn || !fwdBtn || !label) return;

            const { minDate, maxDate } = getConvoStatsDateRange();
            if (minDate && maxDate) {
                const totalDays = daysBetweenInclusive(minDate, maxDate);
                convoStatsTotalWindows = Math.max(1, Math.ceil(totalDays / CONVO_WINDOW_DAYS));
            }

            const atMin = convoStatsWindowCount <= 1;
            const atMax = convoStatsWindowCount >= convoStatsTotalWindows;
            backBtn.disabled = atMin;
            fwdBtn.disabled = atMax;
            backBtn.classList.toggle('opacity-50', atMin);
            backBtn.classList.toggle('cursor-not-allowed', atMin);
            fwdBtn.classList.toggle('opacity-50', atMax);
            fwdBtn.classList.toggle('cursor-not-allowed', atMax);
            
            // Calculate days shown from actual date inputs
            const startInput = document.getElementById('convo-start-date');
            const endInput = document.getElementById('convo-end-date');
            const daysShown = (startInput?.value && endInput?.value) 
                ? daysBetweenInclusive(startInput.value, endInput.value)
                : convoStatsWindowCount * CONVO_WINDOW_DAYS;
            label.textContent = `${daysShown}-day window: ${convoStatsWindowCount}/${convoStatsTotalWindows}`;
        }

        function changeConvoMonthWindow(step) {
            convoStatsWindowCount = Math.min(convoStatsTotalWindows, Math.max(1, convoStatsWindowCount + step));
            
            const { minDate: fullMin, maxDate: fullMax } = getConvoStatsDateRange();
            if (!fullMin || !fullMax) return;
            
            const totalDays = daysBetweenInclusive(fullMin, fullMax);
            convoStatsTotalWindows = Math.max(1, Math.ceil(totalDays / CONVO_WINDOW_DAYS));
            convoStatsWindowCount = Math.min(convoStatsTotalWindows, Math.max(1, convoStatsWindowCount));
            
            const windowStartDate = addDays(parseLocalDateKey(fullMin), (convoStatsWindowCount - 1) * CONVO_WINDOW_DAYS);
            const windowEndDate = addDays(windowStartDate, CONVO_WINDOW_DAYS - 1);
            const maxDate = parseLocalDateKey(fullMax);
            const clampedStartDate = windowStartDate > maxDate ? maxDate : windowStartDate;
            const clampedEndDate = windowEndDate > maxDate ? maxDate : windowEndDate;
            const windowStartKey = formatLocalDateKey(clampedStartDate);
            const windowEndKey = formatLocalDateKey(clampedEndDate);
            
            const startInput = document.getElementById('convo-start-date');
            const endInput = document.getElementById('convo-end-date');
            if (startInput) startInput.value = windowStartKey;
            if (endInput) endInput.value = windowEndKey;
            
            updateConvoMonthWindowControls();
            refreshConvoStatsChart();
        }

        function onConvoPeriodInputChanged() {
            // Just a placeholder for UI reactivity
        }

        function applyConvoPeriodMode() {
            refreshConvoStatsChart();
        }

        function resetConvoChartRange() {
            const { minDate: fullMin, maxDate: fullMax } = getConvoStatsDateRange();
            if (!fullMin || !fullMax) return;

            document.getElementById('convo-start-date').value = fullMin;
            document.getElementById('convo-end-date').value = fullMax;
            refreshConvoStatsChart();
        }

        function buildConvoTrendSeries(options) {
            const perChat = convoStatsTrendData?.per_chat_convos_per_day || {};
            const chatIds = Object.keys(perChat);

            if (chatIds.length === 0) {
                return { labels: [], datasets: [], aggregation: options.aggregation, grandTotals: [], totalConvos: 0, chatCounts: [] };
            }

            const rangeStart = options.startValue || '1970-01-01';
            const rangeEnd = options.endValue || '2099-12-31';

            const bucketMap = {};
            const chatMeta = {};

            chatIds.forEach(chatId => {
                const chatData = perChat[chatId];
                chatMeta[chatId] = { id: chatId, title: chatData.title || chatId };

                Object.entries(chatData.convos_per_day || {}).forEach(([dateStr, count]) => {
                    if (dateStr < rangeStart || dateStr > rangeEnd) return;
                    const date = parseLocalDateKey(dateStr);
                    const key = options.aggregation === 'week'
                        ? formatLocalDateKey(startOfLocalWeek(date))
                        : dateStr;
                    if (!bucketMap[key]) bucketMap[key] = {};
                    bucketMap[key][chatId] = (bucketMap[key][chatId] || 0) + count;
                });
            });

            if (Object.keys(bucketMap).length === 0) {
                return { labels: [], datasets: [], aggregation: options.aggregation, grandTotals: [], totalConvos: 0, chatCounts: [] };
            }

            const sortedKeys = Object.keys(bucketMap).sort();
            const labels = [];
            const countsByChatId = {};
            chatIds.forEach(chatId => { countsByChatId[chatId] = []; });

            const grandTotals = [];
            sortedKeys.forEach(key => {
                const bucketDate = parseLocalDateKey(key);
                if (options.aggregation === 'week') {
                    const weekEnd = addDays(bucketDate, 6);
                    labels.push(`${bucketDate.toLocaleDateString()} – ${weekEnd.toLocaleDateString()}`);
                } else {
                    labels.push(bucketDate.toLocaleDateString());
                }
                let bucketTotal = 0;
                chatIds.forEach(chatId => {
                    const count = bucketMap[key][chatId] || 0;
                    countsByChatId[chatId].push(count);
                    bucketTotal += count;
                });
                grandTotals.push(bucketTotal);
            });

            const chatCounts = chatIds.map(chatId => ({
                id: chatId,
                title: chatMeta[chatId].title,
                total: countsByChatId[chatId].reduce((s, c) => s + c, 0)
            })).sort((a, b) => b.total - a.total);

            const isDark = document.documentElement.classList.contains('dark');
            const palette = [
                '#0891b2', '#059669', '#7c3aed', '#e11d48', '#ea580c', '#ca8a04', '#be123c', '#0284c7',
                '#22d3ee', '#34d399', '#a78bfa', '#fb7185', '#f97316', '#eab308', '#f43f5e', '#38bdf8'
            ];
            const darkPalette = [
                '#22d3ee', '#34d399', '#a78bfa', '#fb7185', '#f97316', '#eab308', '#f43f5e', '#38bdf8',
                '#0891b2', '#059669', '#7c3aed', '#e11d48', '#ea580c', '#ca8a04', '#be123c', '#0284c7'
            ];
            const colors = isDark ? darkPalette : palette;

            const datasets = chatCounts.map((chat, idx) => ({
                label: chat.title,
                data: countsByChatId[chat.id] || [],
                borderColor: colors[idx % colors.length],
                backgroundColor: 'transparent',
                borderWidth: 2,
                pointRadius: 0,
                pointHoverRadius: 4,
                fill: false,
                tension: 0.2,
                kind: 'convo-chat',
                _totalCount: chat.total,
                _id: chat.id
            }));

            const trendWindow = options.aggregation === 'week' ? 4 : 7;
            datasets.push({
                label: options.aggregation === 'week' ? '4-Week Avg (Total)' : '7-Day Avg (Total)',
                data: movingAverage(grandTotals, trendWindow),
                borderColor: isDark ? '#f59e0b' : '#d97706',
                borderWidth: 2,
                borderDash: [6, 4],
                pointRadius: 0,
                fill: false,
                tension: 0.25,
                kind: 'trend'
            });

            const totalConvos = grandTotals.reduce((s, v) => s + v, 0);
            return { labels, datasets, aggregation: options.aggregation, grandTotals, totalConvos, chatCounts };
        }

        function refreshConvoStatsChart() {
            if (!convoStatsTrendData) return;

            const container = document.getElementById('convo-stats-chart-container');
            const summaryEl = document.getElementById('convo-stats-summary');
            const legendEl = document.getElementById('convo-stats-legend');
            if (!container) return;

            if (convoStatsTrendChart) {
                convoStatsTrendChart.destroy();
                convoStatsTrendChart = null;
            }
            const existingChart = Chart.getChart(container.querySelector('canvas'));
            if (existingChart) existingChart.destroy();

            const aggregation = document.getElementById('convo-aggregation')?.value || 'day';
            const startValue = document.getElementById('convo-start-date')?.value || null;
            const endValue = document.getElementById('convo-end-date')?.value || null;
            const options = { aggregation, startValue, endValue };
            const series = buildConvoTrendSeries(options);

            updateConvoMonthWindowControls();

            if (series.labels.length === 0) {
                summaryEl.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400 mt-4">No conversation data found in this window.</p>';
                if (legendEl) legendEl.style.display = 'none';
                return;
            }

            const isDark = document.documentElement.classList.contains('dark');
            const gridColor = isDark ? 'rgba(148, 163, 184, 0.18)' : 'rgba(100, 116, 139, 0.2)';
            const axisColor = isDark ? '#cbd5e1' : '#475569';

            let canvas = container.querySelector('canvas');
            if (!canvas) {
                container.innerHTML = '<canvas id="convo-stats-chart"></canvas>';
                canvas = container.querySelector('canvas');
            }

            convoStatsTrendChart = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: { labels: series.labels, datasets: series.datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            itemSort: (a, b) => {
                                const at = a.dataset?.kind === 'trend';
                                const bt = b.dataset?.kind === 'trend';
                                if (at && !bt) return -1;
                                if (!at && bt) return 1;
                                return (b.parsed?.y ?? 0) - (a.parsed?.y ?? 0);
                            },
                            filter: (item) => (item.parsed?.y ?? 0) > 0 || item.dataset?.kind === 'trend'
                        }
                    },
                    scales: {
                        x: { ticks: { color: axisColor, maxTicksLimit: 10 }, grid: { color: gridColor } },
                        y: { beginAtZero: true, ticks: { precision: 0, color: axisColor }, grid: { color: gridColor } }
                    }
                }
            });

            // Custom legend
            if (legendEl && series.chatCounts.length > 0) {
                const colors = isDark ? [
                    '#22d3ee', '#34d399', '#a78bfa', '#fb7185', '#f97316', '#eab308', '#f43f5e', '#38bdf8',
                    '#0891b2', '#059669', '#7c3aed', '#e11d48', '#ea580c', '#ca8a04', '#be123c', '#0284c7'
                ] : [
                    '#0891b2', '#059669', '#7c3aed', '#e11d48', '#ea580c', '#ca8a04', '#be123c', '#0284c7',
                    '#22d3ee', '#34d399', '#a78bfa', '#fb7185', '#f97316', '#eab308', '#f43f5e', '#38bdf8'
                ];
                legendEl.style.display = 'block';
                legendEl.innerHTML = `<ul>${series.chatCounts.map((chat, idx) => `
                    <li class="chart-legend-item">
                        <div class="chart-legend-color" style="background-color:${colors[idx % 16]};"></div>
                        <span class="chart-legend-label">${escapeHtmlTrends(chat.title)}</span>
                        <span class="chart-legend-count">${chat.total}</span>
                    </li>`).join('')}</ul>`;
            }

            // Summary stats
            const cs = convoStatsTrendData;
            const leans = cs.avg_participation_leans || {};
            const sortedLeans = Object.entries(leans).sort((a, b) => b[1] - a[1]);
            const leansHtml = sortedLeans.map(([sender, pct]) => {
                const barWidth = Math.round(pct * 100);
                return `<div class="mb-2">
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-700 dark:text-gray-300 truncate max-w-[60%]">${escapeHtmlTrends(sender)}</span>
                        <span class="font-semibold text-gray-900 dark:text-white">${(pct * 100).toFixed(1)}%</span>
                    </div>
                    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                        <div class="bg-indigo-500 h-2 rounded-full" style="width:${barWidth}%"></div>
                    </div>
                </div>`;
            }).join('');

            const totalActiveDays = Object.keys(cs.convos_per_day || {}).length;
            const avgCpd = totalActiveDays > 0 ? (cs.total_conversations / totalActiveDays).toFixed(2) : '—';

            summaryEl.innerHTML = `
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6 mt-6">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Global Conversation Aggregates</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-5">
                        <div class="bg-indigo-50 dark:bg-indigo-900/30 rounded-lg p-3">
                            <p class="text-xs text-indigo-600 dark:text-indigo-300 font-medium uppercase tracking-wide">Total Conversations</p>
                            <p class="text-2xl font-bold text-indigo-700 dark:text-indigo-200 mt-1">${cs.total_conversations}</p>
                        </div>
                        <div class="bg-blue-50 dark:bg-blue-900/30 rounded-lg p-3">
                            <p class="text-xs text-blue-600 dark:text-blue-300 font-medium uppercase tracking-wide">Avg Response Time</p>
                            <p class="text-2xl font-bold text-blue-700 dark:text-blue-200 mt-1">${formatMs(cs.avg_in_convo_response_time)}</p>
                        </div>
                        <div class="bg-purple-50 dark:bg-purple-900/30 rounded-lg p-3">
                            <p class="text-xs text-purple-600 dark:text-purple-300 font-medium uppercase tracking-wide">Avg Between Convos</p>
                            <p class="text-2xl font-bold text-purple-700 dark:text-purple-200 mt-1">${formatMs(cs.avg_time_between_convos)}</p>
                        </div>
                        <div class="bg-green-50 dark:bg-green-900/30 rounded-lg p-3">
                            <p class="text-xs text-green-600 dark:text-green-300 font-medium uppercase tracking-wide">Avg Msgs / Convo</p>
                            <p class="text-2xl font-bold text-green-700 dark:text-green-200 mt-1">${(cs.avg_msg_count_per_convo || 0).toFixed(1)}</p>
                        </div>
                        <div class="bg-yellow-50 dark:bg-yellow-900/30 rounded-lg p-3">
                            <p class="text-xs text-yellow-600 dark:text-yellow-300 font-medium uppercase tracking-wide">Avg Duration</p>
                            <p class="text-2xl font-bold text-yellow-700 dark:text-yellow-200 mt-1">${formatMs(cs.avg_duration_ms_per_convo || 0)}</p>
                        </div>
                        <div class="bg-rose-50 dark:bg-rose-900/30 rounded-lg p-3">
                            <p class="text-xs text-rose-600 dark:text-rose-300 font-medium uppercase tracking-wide">Convos / Active Day</p>
                            <p class="text-2xl font-bold text-rose-700 dark:text-rose-200 mt-1">${avgCpd}</p>
                        </div>
                    </div>
                    ${leansHtml ? `<div>
                        <p class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3 uppercase tracking-wide">Avg Participation (All Chats)</p>
                        ${leansHtml}
                    </div>` : ''}
                </div>
            `;
        }

        async function loadConvoStatsTrends() {
            if (convoStatsTrendData) {
                refreshConvoStatsChart();
                return;
            }

            if (convoStatsPollInterval) return;

            const loadingEl = document.getElementById('convo-stats-loading-indicator');
            const summaryEl = document.getElementById('convo-stats-summary');
            loadingEl.style.display = 'block';
            summaryEl.innerHTML = '';

            async function pollConvoStats() {
                try {
                    const resp = await fetch('/api/convo_stats');
                    if (resp.status === 202) return; // still computing
                    if (!resp.ok) {
                        showToast('Conversation stats computation failed, retrying…', 'error', 2600);
                        return;
                    }
                    if (convoStatsPollInterval) {
                        clearInterval(convoStatsPollInterval);
                        convoStatsPollInterval = null;
                    }
                    loadingEl.style.display = 'none';
                    const result = await resp.json();
                    convoStatsTrendData = result.data;
                    
                    // Initialize date inputs with first window only (like GC trends)
                    const { minDate, maxDate } = getConvoStatsDateRange();
                    if (minDate && maxDate) {
                        const startInput = document.getElementById('convo-start-date');
                        const endInput = document.getElementById('convo-end-date');
                        if (startInput && endInput) {
                            // Calculate first window (30 days from minDate)
                            const startDateObj = parseLocalDateKey(minDate);
                            const windowEndDate = addDays(startDateObj, CONVO_WINDOW_DAYS - 1);
                            const maxDateObj = parseLocalDateKey(maxDate);
                            const clampedEndDate = windowEndDate > maxDateObj ? maxDateObj : windowEndDate;
                            
                            startInput.value = minDate;
                            endInput.value = formatLocalDateKey(clampedEndDate);
                            convoStatsWindowCount = 1;
                        }
                    }
                    
                    refreshConvoStatsChart();
                } catch (e) {
                    showToast(`Network error loading conversation stats: ${escapeHtmlTrends(String(e))}`, 'error', 2600);
                }
            }

            await pollConvoStats();
            if (!convoStatsTrendData) {
                convoStatsPollInterval = setInterval(pollConvoStats, 3000);
            }
        }

        // Initialize
        loadGroupChats();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function(err) {
                console.error('Service worker registration failed:', err);
            });
        }
        // Keep auth state in sync across browser tabs
        var _authChannel = new BroadcastChannel('chv_auth');
        _authChannel.onmessage = function(e) {
            if (e.data.type === 'LOGOUT') {
                window.location.href = '/';
            }
        };
        // Broadcast LOGOUT to other tabs before navigating away
        document.querySelectorAll('a[href="/logout"]').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                _authChannel.postMessage({ type: 'LOGOUT' });
                window.location.href = '/logout';
            });
        });
    </script>
</body>
</html>
