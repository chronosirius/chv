<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trends Dashboard - Instagram Analytics</title>
    <script>
        window.tailwind = { config: { darkMode: 'class' } };
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .progress-bar-value {
            width: 30%;
            animation: indeterminate 1.1s infinite linear;
            transform-origin: 0% 50%;
        }

        @keyframes indeterminate {
            0% {
                transform: translateX(-100%) scaleX(1);
            }
            50% {
                transform: translateX(100%) scaleX(1.5);
            }
            100% {
                transform: translateX(400%) scaleX(1);
            }
        }

        .chart-legend-container {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 1rem;
            padding: 0.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.375rem;
            background-color: #f9fafb;
        }

        .dark .chart-legend-container {
            border-color: #374151;
            background-color: #111827;
        }

        .chart-legend-container ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        /* Hide Chart.js default legend - it creates a <ul> */
        #group-chats-chart-container > ul,
        #group-chats-chart-container ul:not(.chart-legend-container ul) {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        #group-chats-chart-container > ul > li {
            display: none !important;
        }
        /* Target Chart.js legend box by its content */
        #group-chats-chart-container [role="region"] {
            display: none !important;
        }

        .chart-legend-item {
            display: flex;
            align-items: center;
            padding: 0.375rem;
            font-size: 0.8125rem;
            line-height: 1.15rem;
        }

        .chart-legend-item input[type="checkbox"] {
            margin-right: 0.5rem;
            width: 0.9rem;
            height: 0.9rem;
            accent-color: #2563eb;
            cursor: pointer;
        }

        .chart-legend-item.is-hidden .chart-legend-label,
        .chart-legend-item.is-hidden .chart-legend-count {
            opacity: 0.45;
        }

        .chart-legend-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.5rem;
        }

        .chart-legend-toggle-btn {
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #1f2937;
            border-radius: 0.375rem;
            padding: 0.3rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }

        .chart-legend-toggle-btn:hover {
            background: #f8fafc;
        }

        .dark .chart-legend-toggle-btn {
            border-color: #4b5563;
            background: #1f2937;
            color: #e5e7eb;
        }

        .dark .chart-legend-toggle-btn:hover {
            background: #374151;
        }

        .chart-legend-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 0.5rem;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .chart-legend-label {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #374151;
        }

        .dark .chart-legend-label {
            color: #d1d5db;
        }

        .chart-legend-count {
            margin-left: 0.375rem;
            font-weight: 600;
            color: #6b7280;
            flex-shrink: 0;
        }

        .dark .chart-legend-count {
            color: #9ca3af;
        }

        .toast-container {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            min-width: 220px;
            max-width: 320px;
            border-radius: 0.5rem;
            padding: 0.625rem 0.75rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            font-size: 0.875rem;
            line-height: 1.25rem;
            border: 1px solid transparent;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 180ms ease, transform 180ms ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast-error {
            background: #fef2f2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .dark .toast-error {
            background: #3f1d1d;
            border-color: #7f1d1d;
            color: #fecaca;
        }

        .toast-info {
            background: #eff6ff;
            border-color: #bfdbfe;
            color: #1e3a8a;
        }

        .dark .toast-info {
            background: #172554;
            border-color: #1d4ed8;
            color: #bfdbfe;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">
    <div class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Trends Dashboard</h1>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">You: {{ current_username or '-' }}</p>
            </div>
            <div class="flex gap-4">
                <a href="/dashboard" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg transition-colors">
                    Back to Dashboard
                </a>
                <button type="button" onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200" aria-label="Toggle theme" title="Toggle theme">
                    <span id="theme-icon">🌙</span>
                </button>
                <button onclick="deleteAccount()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                    Delete Data
                </button>
                <a href="/logout" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg transition-colors">
                    Logout
                </a>
            </div>
        </div>

        <!-- Tabs for different trends -->
        <div class="mb-6">
            <div class="flex gap-2 border-b border-gray-300 dark:border-gray-600">
                <button 
                    id="tab-group-chats"
                    class="px-4 py-3 text-lg font-semibold text-gray-900 dark:text-white border-b-2 border-blue-600 active-tab"
                    onclick="switchTab('group-chats')"
                >
                    Group Chat Trends
                </button>
                <button
                    id="tab-uploader"
                    class="px-4 py-3 text-lg font-semibold text-gray-600 dark:text-gray-400 border-b-2 border-gray-300 dark:border-gray-600"
                    onclick="switchTab('uploader')"
                >
                    Sent/Received Trends
                </button>
                <button
                    id="tab-convo-stats"
                    class="px-4 py-3 text-lg font-semibold text-gray-600 dark:text-gray-400 border-b-2 border-gray-300 dark:border-gray-600"
                    onclick="switchTab('convo-stats')"
                >
                    Conversation Stats
                </button>
                <!-- More tabs can be added here in the future -->
            </div>
        </div>

        <!-- Group Chat Trends Section -->
        <div id="section-group-chats" class="trend-section">
            <div class="mb-6 space-y-4">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-3">
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Granularity</label>
                        <select id="chart-aggregation" onchange="refreshGroupChatsChart()" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white text-sm">
                            <option value="day">Daily</option>
                            <option value="week">Weekly</option>
                        </select>
                    </div>
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Start</label>
                        <input id="chart-start-date" type="date" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white text-sm" onchange="onGroupChatPeriodInputChanged()">
                    </div>
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">End</label>
                        <input id="chart-end-date" type="date" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white text-sm" onchange="onGroupChatPeriodInputChanged()">
                    </div>
                    <div class="lg:col-span-1 flex items-end">
                        <button onclick="applyUserPeriodMode()" class="w-full px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm">Apply Period</button>
                    </div>
                    <div class="lg:col-span-1 flex items-end">
                        <button onclick="resetGroupChatsChartRange()" class="w-full px-3 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg text-sm">Reset</button>
                    </div>
                    <div class="lg:col-span-4">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Progressive Loading</label>
                        <div class="flex items-center gap-2">
                            <button id="month-toggle-btn" type="button" onclick="toggleProgressiveMode()" class="px-3 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-lg text-sm text-white" title="Enable or disable progressive loading">Disable</button>
                            <button id="month-back-btn" type="button" onclick="changeMonthWindow(-1)" class="px-3 py-2 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded-lg text-sm text-gray-800 dark:text-white" title="Show fewer months">◀</button>
                            <button id="month-forward-btn" type="button" onclick="changeMonthWindow(1)" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm text-white" title="Load one more month">▶</button>
                            <div id="month-window-label" class="text-sm text-gray-600 dark:text-gray-300"></div>
                        </div>
                    </div>
                </div>
                <div class="w-full" id="loading-indicator" style="display: none;">
                    <div class="relative h-3 rounded-lg w-full overflow-hidden light:bg-blue-100 dark:bg-blue-900">
                        <div class="progress-bar-value absolute h-full bg-blue-500"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Message Trends by Group Chat</h3>
                <div class="relative h-96 mb-6" id="group-chats-chart-container" style="position: relative;">
                    <canvas id="group-chat-chart"></canvas>
                </div>
                <div id="group-chat-summary" class="mt-4"></div>
            </div>
        </div>

        <div id="section-uploader" class="trend-section" style="display: none;">
            <div class="mb-6 space-y-4">
                <div class="grid grid-cols-1 lg:grid-cols-8 gap-3">
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Granularity</label>
                        <select id="uploader-aggregation" onchange="refreshUploaderChart()" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white text-sm">
                            <option value="day">Daily</option>
                            <option value="week">Weekly</option>
                        </select>
                    </div>
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Start</label>
                        <input id="uploader-start-date" type="date" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white text-sm" onchange="refreshUploaderChart()">
                    </div>
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">End</label>
                        <input id="uploader-end-date" type="date" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white text-sm" onchange="refreshUploaderChart()">
                    </div>
                    <div class="lg:col-span-2 flex items-end">
                        <button onclick="resetUploaderChartRange()" class="w-full px-3 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg text-sm">Reset</button>
                    </div>
                </div>
                <div class="w-full" id="uploader-loading-indicator" style="display: none;">
                    <div class="relative h-3 rounded-lg w-full overflow-hidden light:bg-blue-100 dark:bg-blue-900">
                        <div class="progress-bar-value absolute h-full bg-blue-500"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Your Messages: Sent vs Received</h3>
                <div class="relative h-96 mb-6" id="uploader-chart-container" style="position: relative;">
                    <canvas id="uploader-chart"></canvas>
                </div>
                <div id="uploader-summary" class="mt-4"></div>
            </div>
        </div>

        <!-- Conversation Stats Section -->
        <div id="section-convo-stats" class="trend-section" style="display: none;">
            <div class="mb-6 space-y-4">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-3">
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Granularity</label>
                        <select id="convo-aggregation" onchange="refreshConvoStatsChart()" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white text-sm">
                            <option value="day">Daily</option>
                            <option value="week">Weekly</option>
                        </select>
                    </div>
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Start</label>
                        <input id="convo-start-date" type="date" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white text-sm" onchange="onConvoPeriodInputChanged()">
                    </div>
                    <div class="lg:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">End</label>
                        <input id="convo-end-date" type="date" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white text-sm" onchange="onConvoPeriodInputChanged()">
                    </div>
                    <div class="lg:col-span-1 flex items-end">
                        <button onclick="applyConvoPeriodMode()" class="w-full px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm">Apply Period</button>
                    </div>
                    <div class="lg:col-span-1 flex items-end">
                        <button onclick="resetConvoChartRange()" class="w-full px-3 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg text-sm">Reset</button>
                    </div>
                    <div class="lg:col-span-4">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Window</label>
                        <div class="flex items-center gap-2">
                            <button id="convo-month-back-btn" type="button" onclick="changeConvoMonthWindow(-1)" class="px-3 py-2 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded-lg text-sm text-gray-800 dark:text-white" title="Show fewer months">◀</button>
                            <button id="convo-month-forward-btn" type="button" onclick="changeConvoMonthWindow(1)" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm text-white" title="Show one more month">▶</button>
                            <div id="convo-month-window-label" class="text-sm text-gray-600 dark:text-gray-300"></div>
                        </div>
                    </div>
                </div>
                <div class="w-full" id="convo-stats-loading-indicator" style="display: none;">
                    <div class="relative h-3 rounded-lg w-full overflow-hidden bg-indigo-100 dark:bg-indigo-900">
                        <div class="progress-bar-value absolute h-full bg-indigo-500"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Conversation Trends by Chat</h3>
                <div class="relative h-96 mb-6" id="convo-stats-chart-container">
                    <canvas id="convo-stats-chart"></canvas>
                </div>
                <div id="convo-stats-legend" class="chart-legend-container" style="display: none;"></div>
            </div>
            <div id="convo-stats-summary"></div>
        </div>

        <!-- Additional trend sections can be added here -->
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script>
        Chart.defaults.plugins.legend.display = false;
        let allGroupChats = [];
        let groupChatTrendChart = null;
        let currentTab = 'group-chats';
        let isLoadingGroupChats = false;
        let fullGroupChatsCache = null;
        let fullGroupChatsPrecomputedTrends = null;
        let loadedPrecomputedTrends = null;
        let selectedGroupChatIds = new Set();
        let uploaderTrendChart = null;
        let uploaderTrendPayload = null;
        let uploaderPrecomputedTrends = null;
        let uploaderRangeMinDate = null;
        let uploaderRangeMaxDate = null;
        let isLoadingUploaderTrends = false;
        let fullRangeMinDate = null;
        let fullRangeMaxDate = null;
        let progressiveModeEnabled = true;
        let windowCount = 1;
        let totalWindows = 1;
        let customWindowDays = 30;
        const MAX_SELECTIONS_TO_PERSIST_ACROSS_PERIODS = 12;

        function showToast(message, variant = 'error', durationMs = 2800) {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast toast-${variant}`;
            toast.textContent = message;
            container.appendChild(toast);

            requestAnimationFrame(() => toast.classList.add('show'));

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 200);
            }, durationMs);
        }

        function enforceSelectionCapForPeriodChange() {
            if (selectedGroupChatIds.size <= MAX_SELECTIONS_TO_PERSIST_ACROSS_PERIODS) {
                return;
            }

            selectedGroupChatIds.clear();
            showToast('More than 12 chats selected. Selection was reset for period changes.', 'info', 2800);
        }

        // Tab switching
        function switchTab(tabName) {
            currentTab = tabName;
            const sections = document.querySelectorAll('.trend-section');
            sections.forEach(s => s.style.display = 'none');
            document.getElementById(`section-${tabName}`).style.display = 'block';
            
            // Update active tab styling
            document.querySelectorAll('[id^="tab-"]').forEach(t => {
                t.classList.remove('border-blue-600');
                t.classList.add('border-gray-300', 'dark:border-gray-600', 'text-gray-600', 'dark:text-gray-400');
            });
            const activeBtn = document.getElementById(`tab-${tabName}`);
            activeBtn.classList.add('border-blue-600');
            activeBtn.classList.remove('border-gray-300', 'dark:border-gray-600', 'text-gray-600', 'dark:text-gray-400');
            activeBtn.classList.add('text-gray-900', 'dark:text-white');
            
            // Refresh the tab's chart
            if (tabName === 'group-chats') {
                setTimeout(() => refreshGroupChatsChart(), 0);
            } else if (tabName === 'uploader') {
                if (!uploaderTrendPayload) {
                    setTimeout(() => loadUploaderTrends(), 0);
                } else {
                    setTimeout(() => refreshUploaderChart(), 0);
                }
            } else if (tabName === 'convo-stats') {
                setTimeout(() => loadConvoStatsTrends(), 0);
            }
        }

        // Theme management
        function setThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (!icon) return;
            const isDark = document.documentElement.classList.contains('dark');
            icon.textContent = isDark ? '☀️' : '🌙';
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            setThemeIcon();
            refreshGroupChatsChart();
        }

        setThemeIcon();

        // Utility functions
        function formatShortDate(ms) {
            return new Date(ms).toLocaleDateString();
        }

        function formatLocalDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function parseLocalDateKey(key) {
            const [year, month, day] = key.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function startOfLocalWeek(date) {
            const local = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const day = local.getDay();
            const diffToMonday = (day + 6) % 7;
            local.setDate(local.getDate() - diffToMonday);
            return local;
        }

        function addDays(date, days) {
            const next = new Date(date);
            next.setDate(next.getDate() + days);
            return next;
        }

        function daysBetweenInclusive(startKey, endKey) {
            const start = parseLocalDateKey(startKey);
            const end = parseLocalDateKey(endKey);
            const msPerDay = 24 * 60 * 60 * 1000;
            return Math.max(1, Math.floor((end - start) / msPerDay) + 1);
        }

        function sliceGroupChatsByDateRange(sourceChats, startKey, endKey) {
            return (sourceChats || []).map((groupChat) => {
                const dailyCounts = groupChat.daily_counts || {};
                const filteredDailyCounts = {};
                Object.entries(dailyCounts).forEach(([dateKey, count]) => {
                    if (dateKey >= startKey && dateKey <= endKey) {
                        filteredDailyCounts[dateKey] = count;
                    }
                });

                return {
                    id: groupChat.id,
                    title: groupChat.title,
                    daily_counts: filteredDailyCounts
                };
            }).filter((groupChat) => Object.keys(groupChat.daily_counts).length > 0);
        }

        function getLoadedDateRange() {
            let minDate = null;
            let maxDate = null;

            (allGroupChats || []).forEach((groupChat) => {
                const dailyCounts = groupChat.daily_counts || {};
                Object.keys(dailyCounts).forEach((dateKey) => {
                    if (!minDate || dateKey < minDate) minDate = dateKey;
                    if (!maxDate || dateKey > maxDate) maxDate = dateKey;
                });
            });

            return { minDate, maxDate };
        }

        function movingAverage(values, windowSize) {
            return values.map((_, index) => {
                const windowStart = Math.max(0, index - (windowSize - 1));
                const sample = values.slice(windowStart, index + 1);
                const sum = sample.reduce((acc, value) => acc + value, 0);
                return Number((sum / sample.length).toFixed(2));
            });
        }

        async function fetchGroupChatsData({ months = 1, full = false, selectedIds = null } = {}) {
            const params = new URLSearchParams();
            if (full) {
                params.set('full', '1');
            } else {
                params.set('months', String(Math.max(1, months)));
            }

            if (selectedIds && selectedIds.size > 0) {
                params.set('group_chat_ids', Array.from(selectedIds).join(','));
            }

            const response = await fetch(`/api/group_chat_trends?${params.toString()}`, { cache: 'no-store' });
            const responseData = await response.json().catch(() => ({}));

            if (response.status === 202 || responseData.status === 'processing') {
                return { status: 'processing', responseData };
            }

            if (!response.ok) {
                throw new Error(responseData.error || `Request failed (${response.status})`);
            }

            const gcData = Array.isArray(responseData) ? responseData : responseData.data;
            return { status: 'ready', responseData, gcData };
        }

        function hasUserSelectedPeriod() {
            const startValue = document.getElementById('chart-start-date')?.value || null;
            const endValue = document.getElementById('chart-end-date')?.value || null;
            if (!startValue || !endValue || !fullRangeMinDate || !fullRangeMaxDate) {
                return false;
            }
            return startValue !== fullRangeMinDate || endValue !== fullRangeMaxDate;
        }

        function updateMonthWindowControls() {
            const toggleBtn = document.getElementById('month-toggle-btn');
            const backBtn = document.getElementById('month-back-btn');
            const forwardBtn = document.getElementById('month-forward-btn');
            const label = document.getElementById('month-window-label');

            if (!toggleBtn || !backBtn || !forwardBtn || !label) return;

            if (!progressiveModeEnabled) {
                toggleBtn.textContent = 'Re-enable';
                backBtn.disabled = true;
                forwardBtn.disabled = true;
                backBtn.classList.add('opacity-50', 'cursor-not-allowed');
                forwardBtn.classList.add('opacity-50', 'cursor-not-allowed');
                label.textContent = 'Progressive loading is disabled until you re-enable it';
                return;
            }

            toggleBtn.textContent = 'Disable';
            backBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            forwardBtn.classList.remove('opacity-50', 'cursor-not-allowed');

            if (fullRangeMinDate && fullRangeMaxDate) {
                const totalDays = daysBetweenInclusive(fullRangeMinDate, fullRangeMaxDate);
                totalWindows = Math.max(1, Math.ceil(totalDays / 30));
            }

            backBtn.disabled = windowCount <= 1;
            forwardBtn.disabled = windowCount >= totalWindows;
            label.textContent = `${customWindowDays}-day window: ${windowCount}/${totalWindows}`;

            if (backBtn.disabled) {
                backBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
            if (forwardBtn.disabled) {
                forwardBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        async function applyCurrentWindow(preservePeriodInputs = true) {
            enforceSelectionCapForPeriodChange();

            try {
                await ensureFullGroupChatsLoaded();
            } catch (error) {
                showToast(`Error loading data: ${error.message}`, 'error', 2600);
                return;
            }

            if (!fullRangeMinDate || !fullRangeMaxDate || !Array.isArray(fullGroupChatsCache)) {
                return;
            }

            const totalDays = daysBetweenInclusive(fullRangeMinDate, fullRangeMaxDate);
            totalWindows = Math.max(1, Math.ceil(totalDays / customWindowDays));
            windowCount = Math.min(totalWindows, Math.max(1, windowCount));

            const windowStartDate = addDays(parseLocalDateKey(fullRangeMinDate), (windowCount - 1) * customWindowDays);
            const windowEndDate = addDays(windowStartDate, customWindowDays - 1);
            const maxDate = parseLocalDateKey(fullRangeMaxDate);
            const clampedStartDate = windowStartDate > maxDate ? maxDate : windowStartDate;
            const clampedEndDate = windowEndDate > maxDate ? maxDate : windowEndDate;
            const windowStartKey = formatLocalDateKey(clampedStartDate);
            const windowEndKey = formatLocalDateKey(clampedEndDate);

            allGroupChats = sliceGroupChatsByDateRange(fullGroupChatsCache, windowStartKey, windowEndKey);
            loadedPrecomputedTrends = null;
            initializeGroupChatsControls();

            // Keep date pickers aligned with the currently displayed stepped window.
            const displayedKeys = allGroupChats.flatMap(gc => Object.keys(gc.daily_counts || {}));
            const displayedStart = displayedKeys.length ? displayedKeys.reduce((a, b) => (a < b ? a : b)) : windowStartKey;
            const displayedEnd = displayedKeys.length ? displayedKeys.reduce((a, b) => (a > b ? a : b)) : windowEndKey;
            const startInput = document.getElementById('chart-start-date');
            const endInput = document.getElementById('chart-end-date');
            if (startInput) startInput.value = displayedStart;
            if (endInput) endInput.value = displayedEnd;

            updateMonthWindowControls();
            refreshGroupChatsChart();
        }

        async function toggleProgressiveMode() {
            if (progressiveModeEnabled) {
                progressiveModeEnabled = false;
                updateMonthWindowControls();
                try {
                    await ensureFullGroupChatsLoaded();
                } catch (error) {
                    showToast(`Error loading data: ${error.message}`, 'error', 2600);
                    return;
                }
                if (Array.isArray(fullGroupChatsCache)) {
                    allGroupChats = fullGroupChatsCache;
                    loadedPrecomputedTrends = fullGroupChatsPrecomputedTrends;
                    refreshGroupChatsChart();
                }
                return;
            }

            // Re-enabling: calculate window size from selected period
            const startValue = document.getElementById('chart-start-date')?.value || null;
            const endValue = document.getElementById('chart-end-date')?.value || null;

            if (!startValue || !endValue) {
                showToast('Invalid date range', 'error', 2600);
                return;
            }

            customWindowDays = daysBetweenInclusive(startValue, endValue);

            // Ensure full data is loaded
            try {
                await ensureFullGroupChatsLoaded();
            } catch (error) {
                showToast(`Error loading data: ${error.message}`, 'error', 2600);
                return;
            }

            progressiveModeEnabled = true;
            windowCount = 1;
            await applyCurrentWindow(false);
        }

        async function ensureFullGroupChatsLoaded() {
            if (Array.isArray(fullGroupChatsCache)) {
                return;
            }

            let attempt = 0;
            while (true) {
                attempt += 1;
                try {
                    const result = await fetchGroupChatsData({ full: true });
                    if (result.status === 'processing') {
                        // Background thread is running, poll again shortly.
                        if (attempt === 1 || attempt % 4 === 0) {
                            showToast('Loading full data in background… retrying', 'info', 1800);
                        }
                        await new Promise(resolve => setTimeout(resolve, 1200));
                        continue;
                    }

                    if (result.status !== 'ready') {
                        throw new Error('Failed to load full data');
                    }

                    fullGroupChatsCache = result.gcData || [];
                    const metadata = result.responseData || {};
                    fullGroupChatsPrecomputedTrends = metadata.precomputed_trends || null;
                    fullRangeMinDate = metadata.range?.min_date || fullRangeMinDate;
                    fullRangeMaxDate = metadata.range?.max_date || fullRangeMaxDate;
                    return;
                } catch (error) {
                    throw new Error(`Failed to load full data: ${error.message}`);
                }
            }
        }

        async function changeMonthWindow(step) {
            if (!progressiveModeEnabled) {
                updateMonthWindowControls();
                return;
            }

            const nextCount = Math.min(totalWindows, Math.max(1, windowCount + step));
            if (nextCount === windowCount) {
                updateMonthWindowControls();
                return;
            }

            windowCount = nextCount;
            await applyCurrentWindow(false);
        }

        function onGroupChatPeriodInputChanged() {
            updateMonthWindowControls();
        }

        function applyUserPeriodMode() {
            enforceSelectionCapForPeriodChange();

            if (hasUserSelectedPeriod()) {
                progressiveModeEnabled = false;
                updateMonthWindowControls();
                ensureFullGroupChatsLoaded().then(() => {
                    if (Array.isArray(fullGroupChatsCache)) {
                        allGroupChats = fullGroupChatsCache;
                        loadedPrecomputedTrends = fullGroupChatsPrecomputedTrends;
                        refreshGroupChatsChart();
                    }
                }).catch((error) => {
                    showToast(`Error loading full period data: ${error.message}`, 'error', 2600);
                });
                return;
            }

            if (!progressiveModeEnabled) {
                updateMonthWindowControls();
                ensureFullGroupChatsLoaded().then(() => {
                    if (Array.isArray(fullGroupChatsCache)) {
                        allGroupChats = fullGroupChatsCache;
                        loadedPrecomputedTrends = fullGroupChatsPrecomputedTrends;
                        refreshGroupChatsChart();
                    }
                }).catch((error) => {
                    showToast(`Error loading full period data: ${error.message}`, 'error', 2600);
                });
                return;
            }

            updateMonthWindowControls();
            applyCurrentWindow(false);
        }

        function uploaderChartOptionsFromControls() {
            const aggregation = document.getElementById('uploader-aggregation')?.value || 'day';
            const startValue = document.getElementById('uploader-start-date')?.value || uploaderRangeMinDate;

        function buildUploaderSeries(options) {
            const payload = uploaderTrendPayload || { uploader_username: null, sent_daily_counts: {}, received_daily_counts: {} };
            const sentDailyCounts = payload.sent_daily_counts || {};
            const receivedDailyCounts = payload.received_daily_counts || {};
            const username = payload.uploader_username || 'Uploader';

            const rangeStart = options.startValue || '1970-01-01';
            const rangeEnd = options.endValue || '2099-12-31';
            const sentBucketMap = {};
            const receivedBucketMap = {};

            Object.entries(sentDailyCounts).forEach(([dateStr, count]) => {
                if (dateStr < rangeStart || dateStr > rangeEnd) {
                    return;
                }

                const date = parseLocalDateKey(dateStr);
                const key = options.aggregation === 'week'
                    ? formatLocalDateKey(startOfLocalWeek(date))
                    : dateStr;

                sentBucketMap[key] = (sentBucketMap[key] || 0) + Number(count || 0);
            });

            Object.entries(receivedDailyCounts).forEach(([dateStr, count]) => {
                if (dateStr < rangeStart || dateStr > rangeEnd) {
                    return;
                }

                const date = parseLocalDateKey(dateStr);
                const key = options.aggregation === 'week'
                    ? formatLocalDateKey(startOfLocalWeek(date))
                    : dateStr;

                receivedBucketMap[key] = (receivedBucketMap[key] || 0) + Number(count || 0);
            });

            const allKeys = new Set([...Object.keys(sentBucketMap), ...Object.keys(receivedBucketMap)]);
            const sortedKeys = Array.from(allKeys).sort();

            if (sortedKeys.length === 0) {
                return {
                    username,
                    aggregation: options.aggregation,
                    labels: [],
                    sentCounts: [],
                    receivedCounts: [],
                    sentTrend: [],
                    receivedTrend: [],
                    totalSent: 0,
                    totalReceived: 0,
                    totalBuckets: 0
                };
            }

            const labels = [];
            const sentCounts = [];
            const receivedCounts = [];
            sortedKeys.forEach((key) => {
                const bucketDate = parseLocalDateKey(key);
                if (options.aggregation === 'week') {
                    const weekEnd = addDays(bucketDate, 6);
                    labels.push(`${bucketDate.toLocaleDateString()} - ${weekEnd.toLocaleDateString()}`);
                } else {
                    labels.push(bucketDate.toLocaleDateString());
                }
                sentCounts.push(Number(sentBucketMap[key] || 0));
                receivedCounts.push(Number(receivedBucketMap[key] || 0));
            });

            const trendWindow = options.aggregation === 'week' ? 4 : 7;
            let sentTrend = null;
            let receivedTrend = null;

            if (uploaderPrecomputedTrends) {
                const sentSource = uploaderPrecomputedTrends.sent?.[options.aggregation === 'week' ? 'weekly' : 'daily'];
                const receivedSource = uploaderPrecomputedTrends.received?.[options.aggregation === 'week' ? 'weekly' : 'daily'];

                if (sentSource) {
                    const backendKeys = Array.isArray(sentSource?.keys) ? sentSource.keys : [];
                    const backendTrendValues = Array.isArray(sentSource?.trend) ? sentSource.trend : [];
                    const trendByKey = {};
                    backendKeys.forEach((key, index) => {
                        trendByKey[key] = Number(backendTrendValues[index] ?? 0);
                    });
                    const hasAllKeys = sortedKeys.every((key) => Object.prototype.hasOwnProperty.call(trendByKey, key));
                    if (hasAllKeys) {
                        sentTrend = sortedKeys.map((key) => trendByKey[key]);
                    }
                }

                if (receivedSource) {
                    const backendKeys = Array.isArray(receivedSource?.keys) ? receivedSource.keys : [];
                    const backendTrendValues = Array.isArray(receivedSource?.trend) ? receivedSource.trend : [];
                    const trendByKey = {};
                    backendKeys.forEach((key, index) => {
                        trendByKey[key] = Number(backendTrendValues[index] ?? 0);
                    });
                    const hasAllKeys = sortedKeys.every((key) => Object.prototype.hasOwnProperty.call(trendByKey, key));
                    if (hasAllKeys) {
                        receivedTrend = sortedKeys.map((key) => trendByKey[key]);
                    }
                }
            }

            if (!sentTrend) {
                sentTrend = movingAverage(sentCounts, trendWindow);
            }
            if (!receivedTrend) {
                receivedTrend = movingAverage(receivedCounts, trendWindow);
            }

            const totalSent = sentCounts.reduce((acc, value) => acc + value, 0);
            const totalReceived = receivedCounts.reduce((acc, value) => acc + value, 0);

            return {
                username,
                aggregation: options.aggregation,
                labels,
                sentCounts,
                receivedCounts,
                sentTrend,
                receivedTrend,
                totalSent,
                totalReceived,
                totalBuckets: sortedKeys.length
            };
        }

        function chartOptionsFromControls() {
            const aggregation = document.getElementById('chart-aggregation')?.value || 'day';
            const startValue = document.getElementById('chart-start-date')?.value || null;
            const endValue = document.getElementById('chart-end-date')?.value || null;
            
            return { aggregation, startValue, endValue };
        }

        function buildGroupChatSeries(options) {
            if (allGroupChats.length === 0) {
                return {
                    aggregation: options.aggregation,
                    labels: [],
                    datasets: [],
                    peakCount: 0,
                    peakLabel: '-',
                    totalDays: 0,
                    totalMessages: 0
                };
            }

            const rangeStart = options.startValue || '1970-01-01';
            const rangeEnd = options.endValue || '2099-12-31';

            const bucketMap = {};
            const conversationMeta = {};

            // Iterate over group chats and their pre-aggregated daily counts.
            // Use chat id as the canonical key so same-title chats stay separate.
            allGroupChats.forEach(gc => {
                const conversationId = gc.id;
                if (!conversationId) {
                    return;
                }

                conversationMeta[conversationId] = {
                    id: conversationId,
                    title: gc.title || conversationId
                };

                const dailyCounts = gc.daily_counts || {};

                // Iterate over each day's count (dates are YYYY-MM-DD)
                Object.entries(dailyCounts).forEach(([dateStr, count]) => {
                    // Filter by date range (string comparison works for YYYY-MM-DD)
                    if (dateStr < rangeStart || dateStr > rangeEnd) {
                        return;
                    }

                    const date = parseLocalDateKey(dateStr);
                    let key;
                    if (options.aggregation === 'week') {
                        key = formatLocalDateKey(startOfLocalWeek(date));
                    } else {
                        key = dateStr;
                    }

                    if (!bucketMap[key]) {
                        bucketMap[key] = {};
                    }

                    if (!bucketMap[key][conversationId]) {
                        bucketMap[key][conversationId] = 0;
                    }

                    bucketMap[key][conversationId] += count;
                });
            });

            if (Object.keys(bucketMap).length === 0) {
                return {
                    aggregation: options.aggregation,
                    labels: [],
                    datasets: [],
                    peakCount: 0,
                    peakLabel: '-',
                    totalDays: 0,
                    totalMessages: 0
                };
            }

            const sortedKeys = Object.keys(bucketMap).sort();
            const conversationIds = Object.keys(conversationMeta);

            const labels = [];
            const countsByConversationId = {};
            conversationIds.forEach((conversationId) => {
                countsByConversationId[conversationId] = [];
            });

            let grandTotals = [];
            sortedKeys.forEach((key) => {
                const bucketDate = parseLocalDateKey(key);
                if (options.aggregation === 'week') {
                    const weekEnd = addDays(bucketDate, 6);
                    labels.push(`${bucketDate.toLocaleDateString()} - ${weekEnd.toLocaleDateString()}`);
                } else {
                    labels.push(bucketDate.toLocaleDateString());
                }

                let bucketTotal = 0;
                conversationIds.forEach((conversationId) => {
                    const count = bucketMap[key][conversationId] || 0;
                    countsByConversationId[conversationId].push(count);
                    bucketTotal += count;
                });
                grandTotals.push(bucketTotal);
            });

            const trendWindow = options.aggregation === 'week' ? 4 : 7;
            let trend = null;

            const loadedRange = getLoadedDateRange();
            const isExactLoadedRange = (
                loadedRange.minDate &&
                loadedRange.maxDate &&
                rangeStart === loadedRange.minDate &&
                rangeEnd === loadedRange.maxDate
            );

            if (isExactLoadedRange && loadedPrecomputedTrends) {
                const source = options.aggregation === 'week'
                    ? loadedPrecomputedTrends.weekly
                    : loadedPrecomputedTrends.daily;

                const backendKeys = Array.isArray(source?.keys) ? source.keys : [];
                const backendTrendValues = Array.isArray(source?.trend) ? source.trend : [];

                const trendByKey = {};
                backendKeys.forEach((key, index) => {
                    trendByKey[key] = Number(backendTrendValues[index] ?? 0);
                });

                const hasAllKeys = sortedKeys.every((key) => Object.prototype.hasOwnProperty.call(trendByKey, key));
                if (hasAllKeys) {
                    trend = sortedKeys.map((key) => trendByKey[key]);
                }
            }

            if (!trend) {
                trend = movingAverage(grandTotals, trendWindow);
            }

            let peakIndex = 0;
            grandTotals.forEach((value, index) => {
                if (value > grandTotals[peakIndex]) {
                    peakIndex = index;
                }
            });

            const totalMessages = grandTotals.reduce((acc, value) => acc + value, 0);
            const totalDays = labels.length;

            const palette = [
                '#0891b2', '#059669', '#7c3aed', '#e11d48', '#ea580c', '#ca8a04', '#be123c', '#0284c7',
                '#22d3ee', '#34d399', '#a78bfa', '#fb7185', '#f97316', '#eab308', '#f43f5e', '#38bdf8'
            ];

            const darkPalette = [
                '#22d3ee', '#34d399', '#a78bfa', '#fb7185', '#f97316', '#eab308', '#f43f5e', '#38bdf8',
                '#0891b2', '#059669', '#7c3aed', '#e11d48', '#ea580c', '#ca8a04', '#be123c', '#0284c7'
            ];

            const isDark = document.documentElement.classList.contains('dark');
            const colors = isDark ? darkPalette : palette;

            // Calculate total messages per conversation id and sort by count descending.
            const conversationCounts = conversationIds.map((conversationId) => {
                const total = countsByConversationId[conversationId].reduce((sum, count) => sum + count, 0);
                const meta = conversationMeta[conversationId] || { title: conversationId, id: conversationId };
                return { name: meta.title, total, id: meta.id };
            }).sort((a, b) => b.total - a.total);

            const datasets = [];
            conversationCounts.forEach((convData, index) => {
                const conversationId = convData.id;
                const isSelected = convData.id && selectedGroupChatIds.has(convData.id);
                const hidden = selectedGroupChatIds.size > 0 && !isSelected;
                datasets.push({
                    label: convData.name,
                    data: countsByConversationId[conversationId] || [],
                    borderColor: colors[index % colors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    fill: false,
                    tension: 0.2,
                    kind: 'group-chat',
                    _totalCount: convData.total, // Store for legend use
                    _id: convData.id,
                    _hidden: hidden
                });
            });

            datasets.push({
                label: options.aggregation === 'week' ? '4-Week Avg (Total)' : '7-Day Avg (Total)',
                data: trend,
                borderColor: isDark ? '#f59e0b' : '#d97706',
                borderWidth: 2,
                borderDash: [6, 4],
                pointRadius: 0,
                fill: false,
                tension: 0.25,
                kind: 'trend'
            });

            return {
                aggregation: options.aggregation,
                labels,
                datasets,
                peakCount: grandTotals[peakIndex],
                peakLabel: labels[peakIndex],
                totalDays,
                totalMessages,
                conversationIds: conversationCounts.reduce((map, conv) => {
                    map[conv.id] = conv.id;
                    return map;
                }, {})
            };
        }

        function refreshGroupChatsChart() {
            const canvas = document.getElementById('group-chat-chart');
            const summary = document.getElementById('group-chat-summary');
            
            if (!canvas || !summary) {
                // Create the content structure if it doesn't exist
                const container = document.getElementById('group-chats-chart-container');
                container.innerHTML = `<canvas id="group-chat-chart"></canvas>`;
                setTimeout(() => refreshGroupChatsChart(), 0);
                return;
            }

            if (groupChatTrendChart) {
                groupChatTrendChart.destroy();
                groupChatTrendChart = null;
            }

            // This is more reliable than checking your local variable
            const existingChart = Chart.getChart(canvas); 
            if (existingChart) {
                existingChart.destroy();
            }

            const options = chartOptionsFromControls();
            const series = buildGroupChatSeries(options);
            let legendSelectionMode = false;
            let lastHoverDataIndex = null;
            let frozenLegendDataIndex = null;

            function topGroupChatDatasetIndexesForPoint(dataIndex, limit = 10) {
                if (dataIndex === null || dataIndex === undefined || dataIndex < 0) {
                    return new Set();
                }

                return new Set(
                    series.datasets
                        .map((dataset, datasetIndex) => ({
                            dataset,
                            datasetIndex,
                            value: Number(dataset?.data?.[dataIndex] ?? 0)
                        }))
                        .filter((entry) => entry.dataset.kind === 'group-chat' && entry.value > 0)
                        .sort((a, b) => b.value - a.value)
                        .slice(0, limit)
                        .map((entry) => entry.datasetIndex)
                );
            }

            function rankedGroupChatEntriesForDataPoint(dataIndex) {
                return series.datasets
                    .map((dataset, datasetIndex) => ({
                        dataset,
                        datasetIndex,
                        valueAtPoint: Number(dataset?.data?.[dataIndex] ?? 0)
                    }))
                    .filter((entry) => entry.dataset.kind === 'group-chat')
                    .sort((a, b) => {
                        if (dataIndex !== null && dataIndex >= 0) {
                            return b.valueAtPoint - a.valueAtPoint;
                        }
                        return (b.dataset._totalCount || 0) - (a.dataset._totalCount || 0);
                    });
            }

            if (series.labels.length === 0) {
                summary.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">No messages found in the selected range.</p>';
                return;
            }

            if (typeof Chart === 'undefined') {
                summary.innerHTML = '<p class="text-sm text-red-600 dark:text-red-400">Chart library failed to load.</p>';
                return;
            }

            const isDark = document.documentElement.classList.contains('dark');
            const gridColor = isDark ? 'rgba(148, 163, 184, 0.18)' : 'rgba(100, 116, 139, 0.2)';
            const axisColor = isDark ? '#cbd5e1' : '#475569';

            const chartDatasets = series.datasets.map((ds) => {
                const dataset = { ...ds };
                delete dataset._hidden;
                return dataset;
            });

            groupChatTrendChart = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: series.labels,
                    datasets: chartDatasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    legend: {
                        display: false
                    },
                    plugins: {
                        tooltip: {
                            itemSort: function(a, b) {
                                const aIsTrend = a.dataset?.kind === 'trend';
                                const bIsTrend = b.dataset?.kind === 'trend';

                                if (aIsTrend && !bIsTrend) return -1;
                                if (!aIsTrend && bIsTrend) return 1;

                                const aValue = Number(a.parsed?.y ?? 0);
                                const bValue = Number(b.parsed?.y ?? 0);
                                return bValue - aValue;
                            },
                            filter: function(item) {
                                if (item.dataset?.kind === 'trend') {
                                    return true;
                                }

                                const topIndexes = topGroupChatDatasetIndexesForPoint(item.dataIndex, 10);
                                return topIndexes.has(item.datasetIndex);
                            },
                            callbacks: {
                                label: function(t) {
                                    return `${t.dataset.label}: ${t.formattedValue}`;
                                }
                            }
                        },
                        legend: {
                            display: false,
                            labels: {
                                // Brute force: make the labels invisible and 0px
                                boxWidth: 0,
                                fontSize: 0,
                                generateLabels: () => [] 
                            }
                        },
                        filler: {
                            propagate: true
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: axisColor,
                                maxTicksLimit: 10
                            },
                            grid: {
                                color: gridColor
                            }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: {
                                precision: 0,
                                color: axisColor
                            },
                            grid: {
                                color: gridColor
                            }
                        }
                    },
                    onHover: function(event, activeElements) {
                        const canvas = document.getElementById('group-chat-chart');
                        if (legendSelectionMode) {
                            canvas.style.cursor = 'default';
                            return;
                        }

                        if (activeElements.length > 0) {
                            canvas.style.cursor = 'pointer';
                            const dataIndex = activeElements[0].index;
                            lastHoverDataIndex = dataIndex;
                            updateLegendForDataPoint(dataIndex);
                        } else {
                            canvas.style.cursor = 'default';
                            lastHoverDataIndex = null;
                            updateLegendForDataPoint(null); // Reset to aggregate ranking
                        }
                    },
                    onClick: function(event, activeElements) {
                        legendSelectionMode = !legendSelectionMode;

                        if (legendSelectionMode) {
                            frozenLegendDataIndex = activeElements.length > 0
                                ? activeElements[0].index
                                : lastHoverDataIndex;
                            renderCheckboxLegend();
                        } else {
                            frozenLegendDataIndex = null;
                            updateLegendForDataPoint(null);
                        }
                    }
                }
            });

            // Ensure Chart.js legend is hidden with observer
            const container = document.getElementById('group-chats-chart-container');
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.addedNodes.length) {
                        mutation.addedNodes.forEach((node) => {
                            if (node.tagName === 'UL') {
                                node.style.setProperty('display', 'none', 'important');
                            }
                        });
                    }
                });
            });
            observer.observe(container, { childList: true, subtree: true });
            
            // Also hide any existing legend
            setTimeout(() => {
                const allUls = container.querySelectorAll('ul');
                allUls.forEach(ul => ul.style.setProperty('display', 'none', 'important'));
            }, 100);

            // Apply initial visibility based on selections
            series.datasets.forEach((ds, idx) => {
                if (ds._hidden) {
                    groupChatTrendChart.setDatasetVisibility(idx, false);
                }
            });
            groupChatTrendChart.update();

            function getOrCreateLegendContainer() {
                let legendContainer = document.querySelector('.chart-legend-container');
                if (!legendContainer) {
                    legendContainer = document.createElement('div');
                    legendContainer.className = 'chart-legend-container';
                    const chartContainer = document.getElementById('group-chats-chart-container');
                    chartContainer.parentNode.insertBefore(legendContainer, chartContainer.nextSibling);
                }
                return legendContainer;
            }

            function renderCheckboxLegend() {
                const legendContainer = getOrCreateLegendContainer();
                const groupEntries = rankedGroupChatEntriesForDataPoint(frozenLegendDataIndex);
                const trendEntry = series.datasets
                    .map((dataset, datasetIndex) => ({ dataset, datasetIndex }))
                    .find((entry) => entry.dataset.kind === 'trend');

                const groupLegendHtml = groupEntries
                    .map(({ dataset, datasetIndex, valueAtPoint }) => {
                        const isVisible = groupChatTrendChart ? groupChatTrendChart.isDatasetVisible(datasetIndex) : true;
                        const borderColor = dataset.borderColor || '#000';
                        const displayValue = frozenLegendDataIndex !== null ? valueAtPoint : (dataset._totalCount || 0);
                        return `
                            <label class="chart-legend-item ${isVisible ? '' : 'is-hidden'}">
                                <input type="checkbox" data-dataset-index="${datasetIndex}" ${isVisible ? 'checked' : ''}>
                                <div class="chart-legend-color" style="background-color: ${borderColor};"></div>
                                <span class="chart-legend-label">${dataset.label}</span>
                                <span class="chart-legend-count">${displayValue}</span>
                            </label>
                        `;
                    })
                    .join('');

                const trendLegendHtml = trendEntry ? (() => {
                    const isVisible = groupChatTrendChart ? groupChatTrendChart.isDatasetVisible(trendEntry.datasetIndex) : true;
                    const borderColor = trendEntry.dataset.borderColor || '#000';
                    return `
                        <label class="chart-legend-item ${isVisible ? '' : 'is-hidden'}">
                            <input type="checkbox" data-dataset-index="${trendEntry.datasetIndex}" ${isVisible ? 'checked' : ''}>
                            <div class="chart-legend-color" style="border-top: 2px dashed ${borderColor};"></div>
                            <span class="chart-legend-label">${trendEntry.dataset.label}</span>
                        </label>
                    `;
                })() : '';

                const legendHtml = groupLegendHtml + trendLegendHtml;

                legendContainer.innerHTML = `
                    <div class="chart-legend-controls">
                        <button type="button" class="chart-legend-toggle-btn" data-legend-bulk-toggle>Select all</button>
                    </div>
                    ${legendHtml}
                `;

                const bulkToggleBtn = legendContainer.querySelector('[data-legend-bulk-toggle]');

                function refreshBulkToggleLabel() {
                    if (!bulkToggleBtn) return;
                    const checkboxes = Array.from(legendContainer.querySelectorAll('input[data-dataset-index]'));
                    const allChecked = checkboxes.length > 0 && checkboxes.every((checkbox) => checkbox.checked);
                    bulkToggleBtn.textContent = allChecked ? 'Deselect all' : 'Select all';
                }

                legendContainer.querySelectorAll('input[data-dataset-index]').forEach((input) => {
                    input.addEventListener('change', function() {
                        const datasetIndex = Number(this.getAttribute('data-dataset-index'));
                        if (!groupChatTrendChart || Number.isNaN(datasetIndex)) {
                            return;
                        }

                        const isVisible = Boolean(this.checked);
                        const dataset = series.datasets[datasetIndex];
                        if (dataset && dataset._id) {
                            if (isVisible) {
                                selectedGroupChatIds.add(dataset._id);
                            } else {
                                selectedGroupChatIds.delete(dataset._id);
                            }
                        }

                        groupChatTrendChart.setDatasetVisibility(datasetIndex, isVisible);
                        groupChatTrendChart.update();

                        const row = this.closest('.chart-legend-item');
                        if (row) {
                            row.classList.toggle('is-hidden', !isVisible);
                        }

                        refreshBulkToggleLabel();
                    });
                });

                if (bulkToggleBtn) {
                    bulkToggleBtn.addEventListener('click', function() {
                        const checkboxes = Array.from(legendContainer.querySelectorAll('input[data-dataset-index]'));
                        if (!groupChatTrendChart || checkboxes.length === 0) {
                            return;
                        }

                        const shouldSelectAll = checkboxes.some((checkbox) => !checkbox.checked);

                        if (shouldSelectAll) {
                            const nextSelection = new Set();
                            checkboxes.forEach((checkbox) => {
                                checkbox.checked = true;
                                const row = checkbox.closest('.chart-legend-item');
                                if (row) {
                                    row.classList.remove('is-hidden');
                                }

                                const datasetIndex = Number(checkbox.getAttribute('data-dataset-index'));
                                if (!Number.isNaN(datasetIndex)) {
                                    const dataset = series.datasets[datasetIndex];
                                    if (dataset && dataset._id) {
                                        nextSelection.add(dataset._id);
                                    }
                                    // Update chart visibility for this dataset
                                    groupChatTrendChart.setDatasetVisibility(datasetIndex, true);
                                }
                            });
                            selectedGroupChatIds = nextSelection;
                        } else {
                            checkboxes.forEach((checkbox) => {
                                checkbox.checked = false;
                                const row = checkbox.closest('.chart-legend-item');
                                if (row) {
                                    row.classList.add('is-hidden');
                                }

                                const datasetIndex = Number(checkbox.getAttribute('data-dataset-index'));
                                if (!Number.isNaN(datasetIndex)) {
                                    // Update chart visibility for this dataset
                                    groupChatTrendChart.setDatasetVisibility(datasetIndex, false);
                                }
                            });
                            selectedGroupChatIds.clear();
                        }

                        groupChatTrendChart.update();
                        refreshBulkToggleLabel();
                    });
                }

                refreshBulkToggleLabel();
            }

            // Create or update legend based on hover
            function updateLegendForDataPoint(dataIndex) {
                if (legendSelectionMode) {
                    return;
                }

                const rankedDatasets = rankedGroupChatEntriesForDataPoint(dataIndex);

                const legendHtml = rankedDatasets
                    .map((entry) => {
                        const ds = entry.dataset;
                        const borderColor = ds.borderColor || '#000';
                        const displayValue = dataIndex !== null ? entry.valueAtPoint : (ds._totalCount || 0);
                        return `
                            <div class="chart-legend-item">
                                <div class="chart-legend-color" style="background-color: ${borderColor};"></div>
                                <span class="chart-legend-label">${ds.label}</span>
                                <span class="chart-legend-count">${displayValue}</span>
                            </div>
                        `;
                    }).join('');

                // Add the trend line to legend
                const trendDataset = series.datasets.find(ds => ds.kind === 'trend');
                const trendLegend = trendDataset ? `
                    <div class="chart-legend-item">
                        <div class="chart-legend-color" style="border-top: 2px dashed ${trendDataset.borderColor};"></div>
                        <span class="chart-legend-label">${trendDataset.label}</span>
                    </div>
                ` : '';

                // Update or create legend container
                const legendContainer = getOrCreateLegendContainer();
                legendContainer.innerHTML = legendHtml + trendLegend;
            }

            // Initialize legend with aggregate ranking
            updateLegendForDataPoint(null);

            summary.innerHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm">
                    <div class="rounded-lg bg-gray-50 dark:bg-gray-700/40 p-3">
                        <p class="text-gray-500 dark:text-gray-400">Peak ${series.aggregation === 'week' ? 'Week' : 'Day'}</p>
                        <p class="font-semibold text-gray-900 dark:text-white">${series.peakLabel} (${series.peakCount})</p>
                    </div>
                    <div class="rounded-lg bg-gray-50 dark:bg-gray-700/40 p-3">
                        <p class="text-gray-500 dark:text-gray-400">Average / ${series.aggregation === 'week' ? 'Week' : 'Day'}</p>
                        <p class="font-semibold text-gray-900 dark:text-white">${(series.totalMessages / series.totalDays).toFixed(1)}</p>
                    </div>
                    <div class="rounded-lg bg-gray-50 dark:bg-gray-700/40 p-3">
                        <p class="text-gray-500 dark:text-gray-400">Period / Total</p>
                        <p class="font-semibold text-gray-900 dark:text-white">${series.totalDays} days (${series.totalMessages} total)</p>
                    </div>
                </div>
            `;
        }
